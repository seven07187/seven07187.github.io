<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OVERTALE - 探索型RPG</title>
  <meta name="description" content="OVERTALE - Undertale風探索RPG × 東方風弾幕シューティング。森の奥に潜む杉の巨木に挑め！">
  <style>
/* ===== OVERTALE - Global Styles ===== */

/* Reset & Base */
*, *::before, *::after {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-panel: #1a1a2e;
  --text-primary: #e8e8f0;
  --text-secondary: #a0a0b8;
  --accent-red: #ff3355;
  --accent-yellow: #ffcc33;
  --accent-green: #33ff88;
  --accent-blue: #3388ff;
  --accent-purple: #aa55ff;
  --hp-green: #22cc44;
  --hp-yellow: #cccc22;
  --hp-red: #cc2222;
  --border-color: #e8e8f0;
  --font-pixel: 'Press Start 2P', 'DotGothic16', monospace;
  --font-jp: 'DotGothic16', 'MS Gothic', monospace;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-jp);
}

/* ===== Screen Management ===== */
.screen {
  display: none;
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
}

.screen.active {
  display: flex;
  align-items: center;
  justify-content: center;
}

.screen.overlay {
  background: rgba(0, 0, 0, 0.85);
  z-index: 100;
  backdrop-filter: blur(4px);
}

/* ===== Title Screen ===== */
#title-screen {
  background: var(--bg-primary);
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

.title-container {
  text-align: center;
  z-index: 2;
  animation: titleFadeIn 1.5s ease-out;
}

@keyframes titleFadeIn {
  from { opacity: 0; transform: translateY(-30px); }
  to { opacity: 1; transform: translateY(0); }
}

.title-logo {
  font-family: var(--font-pixel);
  font-size: clamp(2rem, 8vw, 5rem);
  color: var(--text-primary);
  text-shadow:
    0 0 20px rgba(255, 51, 85, 0.6),
    0 0 40px rgba(255, 51, 85, 0.3),
    0 0 80px rgba(255, 51, 85, 0.1);
  letter-spacing: 0.15em;
  margin-bottom: 1rem;
  animation: titleGlow 3s ease-in-out infinite alternate;
}

@keyframes titleGlow {
  from { text-shadow: 0 0 20px rgba(255, 51, 85, 0.6), 0 0 40px rgba(255, 51, 85, 0.3); }
  to { text-shadow: 0 0 30px rgba(170, 85, 255, 0.7), 0 0 60px rgba(170, 85, 255, 0.4); }
}

.title-sub {
  font-size: clamp(0.8rem, 2vw, 1.2rem);
  color: var(--text-secondary);
  margin-bottom: 3rem;
  letter-spacing: 0.3em;
  animation: subtitlePulse 4s ease-in-out infinite;
}

@keyframes subtitlePulse {
  0%, 100% { opacity: 0.6; }
  50% { opacity: 1; }
}

.title-menu {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  margin-bottom: 2rem;
}

.title-option {
  font-family: var(--font-jp);
  font-size: clamp(0.9rem, 2.5vw, 1.3rem);
  padding: 0.6em 2em;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  letter-spacing: 0.1em;
}

.title-option.selected {
  color: var(--accent-yellow);
  transform: scale(1.1);
}

.title-option.selected::before {
  content: '❤️';
  position: absolute;
  left: -1.5em;
  animation: heartBeat 0.8s ease-in-out infinite;
}

@keyframes heartBeat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.2); }
}

.title-hint {
  font-size: 0.7rem;
  color: var(--text-secondary);
  opacity: 0.5;
  margin-top: 1rem;
}

/* Title particles */
.title-particles {
  position: absolute;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 1;
  pointer-events: none;
}

.particle {
  position: absolute;
  background: var(--accent-yellow);
  border-radius: 50%;
  opacity: 0;
  animation: floatParticle 6s linear infinite;
}

@keyframes floatParticle {
  0% { opacity: 0; transform: translateY(100vh) scale(0); }
  20% { opacity: 0.6; }
  80% { opacity: 0.3; }
  100% { opacity: 0; transform: translateY(-10vh) scale(1); }
}

/* ===== Game Screen ===== */
#game-screen {
  flex-direction: column;
  background: var(--bg-primary);
}

#game-canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  border: 2px solid var(--border-color);
  box-shadow: 0 0 30px rgba(255, 51, 85, 0.15);
}

/* Status Bar */
#status-bar {
  display: flex;
  align-items: center;
  gap: 2rem;
  padding: 0.8rem 1.5rem;
  background: var(--bg-panel);
  border: 2px solid var(--border-color);
  border-top: none;
  font-family: var(--font-jp);
  font-size: 0.85rem;
  min-width: 0;
  box-sizing: border-box;
}

.status-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

.status-label {
  color: var(--accent-yellow);
  font-weight: bold;
  font-size: 0.75rem;
}

.status-value {
  color: var(--text-primary);
}

/* HP Bar */
.hp-bar-container {
  width: 120px;
  height: 14px;
  background: var(--hp-red);
  border: 1px solid var(--border-color);
  position: relative;
  overflow: hidden;
}

.hp-bar {
  height: 100%;
  width: 100%;
  background: var(--hp-green);
  transition: width 0.4s ease, background-color 0.4s ease;
}

/* ===== Battle Screen ===== */
#battle-screen {
  background: var(--bg-primary);
  flex-direction: column;
}

#battle-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
  width: min(800px, 95vw);
}

/* Enemy Display */
#enemy-display {
  text-align: center;
  padding: 1rem;
  animation: enemyAppear 0.6s ease-out;
}

@keyframes enemyAppear {
  from { opacity: 0; transform: scale(0.5); }
  to { opacity: 1; transform: scale(1); }
}

#enemy-canvas {
  image-rendering: pixelated;
}

#enemy-name {
  font-family: var(--font-jp);
  font-size: 1.1rem;
  color: var(--text-primary);
  margin-top: 0.3rem;
  letter-spacing: 0.1em;
}

#enemy-hp-bar-container {
  width: 200px;
  height: 10px;
  background: var(--hp-red);
  border: 1px solid var(--border-color);
  margin: 0.3rem auto 0;
  overflow: hidden;
}

#enemy-hp-bar {
  height: 100%;
  width: 100%;
  background: var(--hp-green);
  transition: width 0.5s ease;
}

/* Battle Textbox */
#battle-textbox {
  width: 100%;
  min-height: 60px;
  padding: 1rem 1.2rem;
  background: var(--bg-primary);
  border: 3px solid var(--border-color);
  font-family: var(--font-jp);
  font-size: 0.95rem;
  line-height: 1.6;
  color: var(--text-primary);
}

#battle-text {
  white-space: pre-wrap;
}

/* Bullet Area */
#bullet-area-container {
  width: 100%;
  aspect-ratio: 16 / 9;
  border: 3px solid var(--border-color);
  background: var(--bg-primary);
  position: relative;
  overflow: hidden;
  display: none;
}

#bullet-area-container.active {
  display: block;
}

#bullet-canvas {
  width: 100%;
  height: 100%;
}

/* Battle Commands */
#battle-commands {
  display: flex;
  gap: 0.5rem;
  width: 100%;
  justify-content: center;
}

.battle-cmd {
  flex: 1;
  max-width: 150px;
  padding: 0.7em 0.5em;
  background: var(--bg-primary);
  border: 3px solid var(--border-color);
  color: var(--text-primary);
  font-family: var(--font-jp);
  font-size: clamp(0.65rem, 1.8vw, 0.85rem);
  cursor: pointer;
  transition: all 0.15s;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 0.3em;
}

.battle-cmd:hover,
.battle-cmd.selected {
  background: var(--border-color);
  color: var(--bg-primary);
  transform: scale(1.05);
}

.battle-cmd .cmd-icon {
  font-size: 1em;
}

/* Battle Status */
#battle-status {
  display: flex;
  align-items: center;
  gap: 2rem;
  padding: 0.6rem 1.5rem;
  background: var(--bg-panel);
  border: 2px solid var(--border-color);
  width: 100%;
  font-size: 0.85rem;
}

.battle-status-item {
  display: flex;
  align-items: center;
  gap: 0.5rem;
}

/* ===== Menu Screen ===== */
.menu-container {
  background: var(--bg-panel);
  border: 3px solid var(--border-color);
  padding: 2rem;
  min-width: min(400px, 90vw);
  max-width: 500px;
  animation: menuSlideIn 0.3s ease-out;
}

@keyframes menuSlideIn {
  from { opacity: 0; transform: translateY(-20px); }
  to { opacity: 1; transform: translateY(0); }
}

.menu-title {
  font-family: var(--font-jp);
  font-size: 1.3rem;
  color: var(--accent-yellow);
  text-align: center;
  margin-bottom: 1.5rem;
  letter-spacing: 0.2em;
  border-bottom: 2px solid var(--border-color);
  padding-bottom: 0.8rem;
}

.menu-options {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  margin-bottom: 1.5rem;
}

.menu-option {
  font-family: var(--font-jp);
  font-size: 1rem;
  padding: 0.6em 1em;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  padding-left: 2em;
}

.menu-option:hover,
.menu-option.selected {
  color: var(--accent-yellow);
}

.menu-option.selected::before {
  content: '❤️';
  position: absolute;
  left: 0.2em;
}

.menu-detail {
  background: var(--bg-secondary);
  border: 2px solid var(--border-color);
  padding: 1rem;
  min-height: 100px;
  font-family: var(--font-jp);
  font-size: 0.85rem;
  line-height: 1.8;
  color: var(--text-primary);
}

/* ===== Mobile Controls ===== */
#mobile-controls {
  display: none;
  position: fixed;
  bottom: 0; left: 0;
  width: 100%; height: auto;
  padding: 1rem;
  z-index: 200;
  pointer-events: none;
}

#joystick-area {
  position: fixed;
  bottom: 2rem;
  left: 2rem;
  pointer-events: auto;
}

#joystick-base {
  width: 100px;
  height: 100px;
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(255, 255, 255, 0.3);
  border-radius: 50%;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

#joystick-stick {
  width: 40px;
  height: 40px;
  background: rgba(255, 255, 255, 0.4);
  border: 2px solid rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  position: absolute;
  transition: transform 0.05s;
}

#mobile-buttons {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  display: flex;
  gap: 0.8rem;
  pointer-events: auto;
}

.mobile-btn {
  width: 50px;
  height: 50px;
  border-radius: 50%;
  border: 2px solid rgba(255, 255, 255, 0.5);
  background: rgba(255, 255, 255, 0.15);
  color: var(--text-primary);
  font-family: var(--font-pixel);
  font-size: 0.8rem;
  cursor: pointer;
  touch-action: none;
  -webkit-tap-highlight-color: transparent;
}

.mobile-btn:active {
  background: rgba(255, 255, 255, 0.35);
  transform: scale(0.9);
}

/* ===== Notifications & Effects ===== */
.notification {
  position: fixed;
  top: 2rem;
  left: 50%;
  transform: translateX(-50%);
  padding: 0.8em 2em;
  background: var(--bg-panel);
  border: 2px solid var(--accent-yellow);
  color: var(--accent-yellow);
  font-family: var(--font-jp);
  font-size: 0.9rem;
  z-index: 500;
  animation: notifSlide 0.3s ease-out;
}

.notification.hidden { display: none; }

@keyframes notifSlide {
  from { opacity: 0; transform: translateX(-50%) translateY(-20px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

.screen-flash {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 400;
  opacity: 0;
  transition: opacity 0.1s;
}

.screen-flash.active {
  opacity: 1;
  background: white;
  animation: flashOut 0.3s ease-out forwards;
}

@keyframes flashOut {
  from { opacity: 0.8; }
  to { opacity: 0; }
}

/* Damage shake */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-5px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-3px); }
  80% { transform: translateX(3px); }
}

.shake {
  animation: shake 0.3s ease-in-out;
}

/* Level up effect */
@keyframes levelUp {
  0% { transform: scale(1); }
  50% { transform: scale(1.3); text-shadow: 0 0 20px var(--accent-yellow); }
  100% { transform: scale(1); }
}

.level-up {
  animation: levelUp 0.6s ease-in-out;
}

/* ===== Responsive ===== */
@media (max-width: 1024px), (pointer: coarse) {
  #mobile-controls {
    display: block;
  }

  #status-bar {
    min-width: auto;
    width: 95vw;
    gap: 1rem;
    font-size: 0.7rem;
    padding: 0.5rem 0.8rem;
  }

  .hp-bar-container {
    width: 80px;
    height: 10px;
  }
}

@media (max-width: 480px) {
  .battle-cmd {
    padding: 0.5em 0.3em;
    font-size: 0.6rem;
  }

  .menu-container {
    padding: 1rem;
  }
}

/* ===== Shop Screen ===== */
.shop-container {
  background: var(--bg-panel);
  border: 3px solid var(--border-color);
  padding: 1.5rem;
  width: min(500px, 95vw);
  max-height: 80vh;
  display: flex;
  flex-direction: column;
  animation: menuSlideIn 0.3s ease-out;
}

.shop-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-bottom: 2px solid var(--border-color);
  padding-bottom: 0.8rem;
  margin-bottom: 1rem;
}

.shop-name {
  font-family: var(--font-jp);
  font-size: 1.2rem;
  color: var(--accent-yellow);
  letter-spacing: 0.1em;
}

.shop-gold-display {
  font-family: var(--font-jp);
  font-size: 1rem;
  color: var(--text-primary);
}

.shop-tabs {
  display: flex;
  gap: 0.5rem;
  margin-bottom: 1rem;
}

.shop-tab {
  flex: 1;
  text-align: center;
  padding: 0.5em;
  font-family: var(--font-jp);
  font-size: 0.9rem;
  border: 2px solid var(--border-color);
  color: var(--text-secondary);
  cursor: pointer;
  background: var(--bg-primary);
}

.shop-tab.active {
  background: var(--accent-blue);
  color: #fff;
  border-color: #fff;
}

.shop-list {
  flex: 1;
  overflow-y: auto;
  border: 2px solid var(--border-color);
  background: var(--bg-secondary);
  min-height: 200px;
  margin-bottom: 1rem;
}

.shop-item {
  display: flex;
  justify-content: space-between;
  padding: 0.8em 1em;
  font-family: var(--font-jp);
  font-size: 0.9rem;
  border-bottom: 1px solid rgba(255, 255, 255, 0.1);
  color: var(--text-primary);
}

.shop-item.selected {
  background: rgba(255, 204, 51, 0.2);
  color: var(--accent-yellow);
}

.shop-item.cant-afford {
  opacity: 0.5;
}

.shop-item-count {
  font-size: 0.8em;
  color: var(--text-secondary);
  margin-left: 0.5em;
}

.shop-desc {
  min-height: 60px;
  background: var(--bg-primary);
  border: 2px solid var(--border-color);
  padding: 0.8rem;
  font-family: var(--font-jp);
  font-size: 0.9rem;
  color: var(--text-primary);
  margin-bottom: 1rem;
  line-height: 1.5;
}

.shop-hint {
  text-align: center;
  font-size: 0.8rem;
  color: var(--text-secondary);
}

/* ===== Text Scene (Opening/Ending) ===== */
#text-scene-overlay {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  background: rgba(0, 0, 0, 0.95);
  z-index: 300;
  display: none;
  align-items: center;
  justify-content: center;
  flex-direction: column;
}

#text-scene-overlay.active {
  display: flex;
  animation: textSceneFadeIn 0.5s ease-out;
}

@keyframes textSceneFadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

#text-scene-container {
  max-width: min(700px, 90vw);
  text-align: center;
  padding: 2rem;
}

#text-scene-line {
  font-family: var(--font-jp);
  font-size: clamp(1rem, 2.5vw, 1.3rem);
  color: #ffffff;
  line-height: 2;
  letter-spacing: 0.1em;
  white-space: pre-wrap;
  text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
}

/* ===== Event Choice ===== */
.event-choice-container {
  display: none;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(0, 0, 0, 0.92);
  border: 3px solid var(--border-color);
  padding: 1.5rem 2.5rem;
  z-index: 310;
  min-width: 250px;
  flex-direction: column;
  gap: 0.5rem;
  animation: choiceAppear 0.3s ease-out;
}

.event-choice-container.active {
  display: flex;
}

@keyframes choiceAppear {
  from { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
  to { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

.event-choice-option {
  font-family: var(--font-jp);
  font-size: 1.1rem;
  color: var(--text-secondary);
  padding: 0.7em 1em;
  cursor: pointer;
  transition: all 0.15s;
  position: relative;
  padding-left: 2em;
  letter-spacing: 0.05em;
}

.event-choice-option:hover,
.event-choice-option.selected {
  color: var(--accent-yellow);
}

.event-choice-option.selected::before {
  content: '❤️';
  position: absolute;
  left: 0.2em;
  animation: heartBeat 0.8s ease-in-out infinite;
}

</style>

<body>

  <!-- ===== タイトル画面 ===== -->
  <div id="title-screen" class="screen active">
    <div class="title-container">
      <h1 class="title-logo">OVERTALE</h1>
      <p class="title-sub">森の奥へ…</p>
      <div class="title-menu">
        <div class="title-option selected" data-action="start">はじめから</div>
        <div class="title-option" data-action="continue">つづきから</div>
      </div>
      <p class="title-hint">Z / Enter / 画面タップ で決定</p>
    </div>
    <div class="title-particles" id="title-particles"></div>
  </div>

  <!-- ===== ゲーム画面 ===== -->
  <div id="game-screen" class="screen">
    <canvas id="game-canvas"></canvas>

    <!-- ステータスバー -->
    <div id="status-bar">
      <div class="status-item">
        <span class="status-label">LV</span>
        <span id="status-level" class="status-value">1</span>
      </div>
      <div class="status-item">
        <span class="status-label">HP</span>
        <div class="hp-bar-container">
          <div id="hp-bar" class="hp-bar"></div>
        </div>
        <span id="status-hp" class="status-value">20/20</span>
      </div>
      <div class="status-item">
        <span class="status-label">EXP</span>
        <span id="status-exp" class="status-value">0</span>
      </div>
      <div class="status-item">
        <span class="status-label">G</span>
        <span id="status-gold" class="status-value">100</span>
      </div>
    </div>
  </div>

  <!-- ===== 戦闘画面 ===== -->
  <div id="battle-screen" class="screen">
    <div id="battle-container">
      <!-- 敵表示エリア -->
      <div id="enemy-display">
        <canvas id="enemy-canvas" width="200" height="200"></canvas>
        <div id="enemy-name"></div>
        <div id="enemy-hp-bar-container">
          <div id="enemy-hp-bar"></div>
        </div>
      </div>

      <!-- テキストボックス -->
      <div id="battle-textbox">
        <p id="battle-text"></p>
      </div>

      <!-- 弾幕エリア -->
      <div id="bullet-area-container">
        <canvas id="bullet-canvas"></canvas>
      </div>

      <!-- コマンドUI -->
      <div id="battle-commands">
        <button class="battle-cmd selected" data-cmd="fight" id="cmd-fight">
          <span class="cmd-icon">⚔️</span>たたかう
        </button>
        <button class="battle-cmd" data-cmd="talk" id="cmd-talk">
          <span class="cmd-icon">💬</span>はなす
        </button>
        <button class="battle-cmd" data-cmd="item" id="cmd-item">
          <span class="cmd-icon">🎒</span>アイテム
        </button>
        <button class="battle-cmd" data-cmd="flee" id="cmd-flee">
          <span class="cmd-icon">🏃</span>にげる

  <script>
// ===== input.js - 入力管理 =====
const Input = (() => {
  const keys = {};
  const justPressed = {};
  const prevKeys = {};
  let mouseConfirmJustPressed = false;

  // キーマッピング
  const KEY_MAP = {
    'ArrowUp': 'up',
    'ArrowDown': 'down',
    'ArrowLeft': 'left',
    'ArrowRight': 'right',
    'z': 'confirm',
    'Z': 'confirm',
    'Enter': 'confirm',
    'x': 'cancel',
    'X': 'cancel',
    'Shift': 'cancel',
    'c': 'menu',
    'C': 'menu',
  };

  // キーボードイベント
  document.addEventListener('keydown', (e) => {
    const action = KEY_MAP[e.key];
    if (action) {
      e.preventDefault();
      keys[action] = true;
    }
  });

  document.addEventListener('keyup', (e) => {
    const action = KEY_MAP[e.key];
    if (action) {
      keys[action] = false;
    }
  });

  // スマホジョイスティック
  const joystickBase = document.getElementById('joystick-base');
  const joystickStick = document.getElementById('joystick-stick');
  let joystickActive = false;
  let joystickOrigin = { x: 0, y: 0 };
  const joystickVector = { x: 0, y: 0 };
  const JOYSTICK_RADIUS = 35;

  if (joystickBase) {
    joystickBase.addEventListener('touchstart', (e) => {
      e.preventDefault();
      joystickActive = true;
      const rect = joystickBase.getBoundingClientRect();
      joystickOrigin.x = rect.left + rect.width / 2;
      joystickOrigin.y = rect.top + rect.height / 2;
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (!joystickActive) return;
      e.preventDefault();
      const touch = e.touches[0];
      let dx = touch.clientX - joystickOrigin.x;
      let dy = touch.clientY - joystickOrigin.y;
      const dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > JOYSTICK_RADIUS) {
        dx = (dx / dist) * JOYSTICK_RADIUS;
        dy = (dy / dist) * JOYSTICK_RADIUS;
      }

      joystickStick.style.transform = `translate(${dx}px, ${dy}px)`;
      joystickVector.x = dx / JOYSTICK_RADIUS;
      joystickVector.y = dy / JOYSTICK_RADIUS;

      // 方向キーに変換
      keys['up'] = joystickVector.y < -0.3;
      keys['down'] = joystickVector.y > 0.3;
      keys['left'] = joystickVector.x < -0.3;
      keys['right'] = joystickVector.x > 0.3;
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      if (!joystickActive) return;
      joystickActive = false;
      joystickStick.style.transform = '';
      joystickVector.x = 0;
      joystickVector.y = 0;
      keys['up'] = false;
      keys['down'] = false;
      keys['left'] = false;
      keys['right'] = false;
    });
  }

  // スマホボタン
  const setupMobileBtn = (id, action) => {
    const btn = document.getElementById(id);
    if (!btn) return;
    btn.addEventListener('touchstart', (e) => {
      e.preventDefault();
      keys[action] = true;
    }, { passive: false });
    btn.addEventListener('touchend', (e) => {
      e.preventDefault();
      keys[action] = false;
    }, { passive: false });
  };

  setupMobileBtn('btn-confirm', 'confirm');
  setupMobileBtn('btn-cancel', 'cancel');
  setupMobileBtn('btn-menu', 'menu');

  return {
    /** 現在キーが押されているか */
    isDown(action) {
      return !!keys[action];
    },

    /** フレーム内で新しく押されたか */
    isJustPressed(action) {
      return !!justPressed[action];
    },

    /** フレーム終了時に呼ぶ */
    update() {
      for (const action in keys) {
        // キーボードまたはタップの状態を反映
        let isPressed = !!keys[action];
        
        // confirmアクションの場合、タップ/クリックも判定に含める
        if (action === 'confirm' && mouseConfirmJustPressed) {
          isPressed = true;
        }

        justPressed[action] = isPressed && !prevKeys[action];
        prevKeys[action] = isPressed;
      }
      // タップフラグのリセット
      mouseConfirmJustPressed = false;
    },

    /** ジョイスティックのベクトル */
    getJoystick() {
      return { ...joystickVector };
    },

    /** 強制的に confirm を発生させる (外部用) */
    triggerConfirm() {
      mouseConfirmJustPressed = true;
    }
  };
})();

</script>

      // 選択インデックスの範囲チェック
      if (shopSelectedIndex >= shopList.length) shopSelectedIndex = Math.max(0, shopList.length - 1);

        if (shopCategory === 'armors' && Player.state.armor === item.id) equipped = true;
        if (shopCategory === 'items') {
          const count = Player.getItemCount(item.id);
          if (count > 0) countText = `(所持:${count})`;
        }

        itemEl.innerHTML = `
          <div class="shop-item-name">${equipped ? 'E ' : ''}${item.name} <span class="shop-item-count">${countText}</span></div>
          <div class="shop-item-price">${item.price} G</div>

        // タップで選択＆購入
        itemEl.addEventListener('click', () => {
          shopSelectedIndex = i;
          Input.triggerConfirm();
          this.updateShopUI();
        });
        listEl.appendChild(itemEl);
      });

      // 詳細表示
      const detailEl = document.getElementById('shop-desc');
      if (shopList[shopSelectedIndex]) {

      } else {
        detailEl.textContent = '';

    /** ショップ入力処理（main.jsから呼ばれる） */
    handleShopInput() {
      if (!isShopOpen) return;

      if (Input.isJustPressed('cancel')) {
        this.closeShop();
        return;
      }

      if (Input.isJustPressed('left') || Input.isJustPressed('right')) {
        const cats = ['items', 'weapons', 'armors'];
        let idx = cats.indexOf(shopCategory);
        idx = Input.isJustPressed('right') ? (idx + 1) % 3 : (idx + 2) % 3;
        shopCategory = cats[idx];
        shopSelectedIndex = 0;
        this.updateShopUI();

      }

      if (Input.isJustPressed('up') && shopSelectedIndex > 0) {
        shopSelectedIndex--;
        this.updateShopUI();
      } else if (Input.isJustPressed('down') && shopSelectedIndex < shopList.length - 1) {
        shopSelectedIndex++;
        this.updateShopUI();
      }

      if (Input.isJustPressed('confirm') && shopList.length > 0) {
        const item = shopList[shopSelectedIndex];
        if (Player.state.gold >= item.price) {
          // 購入確認なしで直接買う（シンプルスタイル）

          document.getElementById('shop-gold').textContent = `${Player.state.gold} G`;

    initListeners() {
      document.querySelectorAll('.shop-tab').forEach(tab => {
        tab.addEventListener('click', () => {
          if (isShopOpen) {
            shopCategory = tab.dataset.cat;
            shopSelectedIndex = 0;
            this.updateShopUI();
          }
        });
      });
    }
  };
})();

// リスナー初期化
Items.initListeners();

  <script>
// ===== player.js - プレイヤー管理 =====
const Player = (() => {
  const state = {
    level: 1,
    hp: 20,
    maxHp: 20,
    attack: 5,
    defense: 0,
    exp: 0,
    gold: 100,
    // マップ上の位置（スギナシ町広場）
    mapX: 25 * 32 + 16,
    mapY: 20 * 32 + 16,
    // 弾幕フェーズのハート位置
    heartX: 0,
    heartY: 0,
    // 装備
    weapon: null,   // 武器ID
    armor: null,    // 防具ID
    // インベントリ: [{ id: string, count: number }]
    inventory: [],
    // ストーリーフラグ
    flags: {
      routePoint: 0,
      noKill: true,
      boss1Cleared: false,
      boss2Cleared: false,
      finalUnlocked: false,
      killCount: 0,
      helpNature: false,
      listenedToPriestess: false,
      // 廃墟マップ用フラグ
      readSign: false,
      lootedShops: 0,
      powerOn: false,
      shelterRestored: false,
      readDiaryCount: 0,
      learnedForestTruth: false,
      learnedCoexistenceHint: false,
      memorialSeen: false
    },
    // 状態異常リスト（例: 'sneeze'）
    statusEffects: [],
    // 無敵時間（ダメージ後のiフレーム）
    invincible: 0,
  };

  const HEART_SIZE = 12;
  const HEART_SPEED = 1.5;

  return {
    state,
    HEART_SIZE,

    /** ステータスの初期化 */
    init() {
      state.level = 1;
      state.hp = 20;
      state.maxHp = 20;
      state.attack = 5;
      state.defense = 0;
      state.exp = 0;
      state.gold = 100;
      state.mapX = 25 * 32 + 16;
      state.mapY = 20 * 32 + 16;
      state.weapon = null;
      state.armor = null;
      state.inventory = [];
      state.flags = {
        routePoint: 0,
        noKill: true,
        boss1Cleared: false,
        boss2Cleared: false,
        finalUnlocked: false,
        killCount: 0,
        helpNature: false,
        listenedToPriestess: false,
        // 廃墟マップ用フラグ
        readSign: false,
        lootedShops: 0,
        powerOn: false,
        shelterRestored: false,
        readDiaryCount: 0,
        learnedForestTruth: false,
        learnedCoexistenceHint: false,
        memorialSeen: false
      };
      state.statusEffects = [];
      state.invincible = 0;
    },

    /** 弾幕フェーズでのハート移動 */
    updateHeart(bounds) {
      if (Input.isDown('up')) state.heartY -= HEART_SPEED;
      if (Input.isDown('down')) state.heartY += HEART_SPEED;
      if (Input.isDown('left')) state.heartX -= HEART_SPEED;
      if (Input.isDown('right')) state.heartX += HEART_SPEED;

      // 弾幕エリア境界制限
      state.heartX = Math.max(bounds.left + HEART_SIZE, Math.min(bounds.right - HEART_SIZE, state.heartX));
      state.heartY = Math.max(bounds.top + HEART_SIZE, Math.min(bounds.bottom - HEART_SIZE, state.heartY));

      // 状態異常「くしゃみ」：たまにランダムに吹き飛ぶ
      if (state.statusEffects && state.statusEffects.includes('sneeze')) {
        if (Math.random() < 0.02) { // 2%の確率で毎フレームくしゃみ
          const dashX = (Math.random() - 0.5) * 40;
          const dashY = (Math.random() - 0.5) * 40;
          state.heartX = Math.max(bounds.left + HEART_SIZE, Math.min(bounds.right - HEART_SIZE, state.heartX + dashX));
          state.heartY = Math.max(bounds.top + HEART_SIZE, Math.min(bounds.bottom - HEART_SIZE, state.heartY + dashY));
          
          // UIで知らせる（くしゃみエフェクト）
          if (typeof UI !== 'undefined' && Math.random() < 0.3) {
            UI.showNotification('ハックション！', 500);
          }
        }
      }

      // 無敵時間カウントダウン
      if (state.invincible > 0) state.invincible--;
    },

    /** ハートの描画 */
    drawHeart(ctx) {
      const x = state.heartX;
      const y = state.heartY;
      const s = HEART_SIZE;

      ctx.save();

      // 無敵時間中は点滅
      if (state.invincible > 0 && Math.floor(state.invincible / 3) % 2 === 0) {
        ctx.globalAlpha = 0.4;
      }

      ctx.fillStyle = '#ff3355';
      ctx.beginPath();
      // ハート形状
      ctx.moveTo(x, y - s * 0.3);
      ctx.bezierCurveTo(x - s, y - s, x - s, y, x, y + s * 0.7);
      ctx.bezierCurveTo(x + s, y, x + s, y - s, x, y - s * 0.3);
      ctx.fill();

      ctx.restore();
    },

    /** 実効攻撃力（装備込み） */
    getAttack() {
      let atk = state.attack;
      if (state.weapon && typeof Items !== 'undefined') {
        const w = Items.getWeapon(state.weapon);
        if (w) atk += w.attack;
      }
      return atk;
    },

    /** 実効防御力（装備込み） */
    getDefense() {
      let def = state.defense;
      if (state.armor && typeof Items !== 'undefined') {
        const a = Items.getArmor(state.armor);
        if (a) def += a.defense;
      }

    takeDamage(amount) {
      if (state.invincible > 0) return false;
      const def = this.getDefense();
      const actual = Math.max(1, amount - Math.floor(def / 3));
      state.hp = Math.max(0, state.hp - actual);
      state.invincible = 45; // 約0.75秒の無敵
      return true;
    },

    /** 回復 */
    heal(amount) {
      state.hp = Math.min(state.maxHp, state.hp + amount);
    },

    /** EXP取得＋レベルアップ判定 */
    gainExp(amount) {
      state.exp += amount;
      let leveled = false;
      while (state.exp >= state.level * 10) {
        state.exp -= state.level * 10;
        state.level++;
        state.maxHp += 5;
        state.attack += 2;
        leveled = true;
      }
      return leveled;
    },

    /** ゴールド獲得 */
    gainGold(amount) {
      state.gold += amount;
    },

    /** アイテム追加 */
    addItem(itemId, count = 1) {
      const existing = state.inventory.find(i => i.id === itemId);
      if (existing) {
        existing.count += count;
      } else {
        state.inventory.push({ id: itemId, count });
      }
    },

    /** アイテム使用（1個減らす） */
    useItem(itemId) {
      const existing = state.inventory.find(i => i.id === itemId);
      if (!existing || existing.count <= 0) return false;
      existing.count--;
      if (existing.count <= 0) {
        state.inventory = state.inventory.filter(i => i.count > 0);
      }
      return true;
    },

    /** アイテム所持数 */
    getItemCount(itemId) {
      const existing = state.inventory.find(i => i.id === itemId);
      return existing ? existing.count : 0;
    },

    hpRatio() {

    exportData() {

      '……まだ、外を歩ける人がいたんだな',
      'ここはもう、ほとんど終わった町だ。',
      'みんな外に出られなくなって、\nそのまま帰ってこなかった。',
      '……あんたも、花粉症か？\n（主人公はうなずいた）',
      'そうか……それは、つらいよな。',
      '俺もだよ。\n最初は、ただのくしゃみと目のかゆみだけだった。',
      'でも、年々ひどくなっていって…\nついには外に出ることすらできなくなった。',
      '……それで、あんたはここに何しに来た？\n（主人公は「杉の巨木を倒すため」と答える）'
    ], isSurvivorEvent: true });
    MAPS['ruins_hospital'] = createHouse('ruins_hospital', 55, 122, { id: 'hospital_record', x: 6, y: 5, name: '診察記録', dialogue: ['（ボロボロのカルテだ…）\n『花粉症患者の異常な増加。しかし、これは自然現象ではない…森のバランスが崩れている。』'], isObject: true, inspectEvent: 'ruins_hospital' });
    MAPS['ruins_hospital'].warps.push({ x: 6, y: 2, target: 'ruins_basement', tx: 6, ty: 7 });
    MAPS['ruins_hospital'].data[2][6] = 13; // 地下への扉を配置
    
    MAPS['ruins_school'] = createHouse('ruins_school', 71, 122, { id: 'school_diary', x: 6, y: 4, name: '手記', dialogue: ['（教室の机に残された日記…）\n『空気が重い。外に出られない。町が変になっている。』'], isObject: true, inspectEvent: 'ruins_school' });
    MAPS['ruins_shop'] = createHouse('ruins_shop', 70, 114, { id: 'ruins_loot', x: 6, y: 4, name: '商店街の残骸', dialogue: ['（崩れた店の中に、使えそうな物が落ちている…）'], isObject: true, inspectEvent: 'ruins_loot' });
    MAPS['ruins_basement'] = createHouse('ruins_basement', 6, 2, { id: 'basement_record', x: 6, y: 4, name: '秘密の記録', dialogue: ['（誰かが残した研究データだ…）\n『杉を全て消すのではなく、森のバランスを戻す方法があるはずだ…！』'], isObject: true, inspectEvent: 'ruins_basement' });
    MAPS['ruins_basement'].warps[0].target = 'ruins_hospital'; // 病院に戻るように書き換え
  }

  setupMaps();

  const ZONES = [
    { id: 'suginashi',  x: 10, y: 10, w: 30, h: 20, name: 'スギナシ町', safe: true },
    { id: 'field1_e',   x: 40, y: 15, w: 45, h: 11, name: 'スギナシ郊外', encounters: ['grass'] },
    { id: 'field1_s',   x: 75, y: 25, w: 11, h: 50, name: 'スギナシ郊外', encounters: ['grass'] },
    { id: 'hanamizu',   x: 65, y: 75, w: 30, h: 20, name: 'ハナミズシティ', safe: true },
    { id: 'field2_w',   x: 25, y: 70, w: 40, h: 11, name: '森林地帯', encounters: ['grass', 'flower'] }, 
    { id: 'field2_s',   x: 25, y: 80, w: 11, h: 30, name: '森林地帯', encounters: ['grass', 'flower'] }, 
    { id: 'greenline',  x: 15, y: 110, w: 30, h: 20, name: 'グリーンライン', safe: true },
    { id: 'ruins',      x: 50, y: 105, w: 30, h: 20, name: '花粉廃墟', safe: true, hazard: 'pollen_fog' },
    { id: 'field3_1',   x: 30, y: 130, w: 65, h: 11, name: '深い森・洞窟', encounters: ['flower', 'ranger'] },
    { id: 'field3_2',   x: 85, y: 140, w: 11, h: 20, name: '深い森・洞窟', encounters: ['flower', 'ranger'] },
    { id: 'shida',      x: 75, y: 160, w: 30, h: 20, name: 'シダの里', safe: true },
    { id: 'cedar_sea',  x: 50, y: 180, w: 35, h: 11, name: '杉樹海', encounters: ['ranger', 'flower', 'grass'] },
    { id: 'boss_area',  x: 45, y: 190, w: 20, h: 10, name: 'ボスエリア', boss: true },
  ];

  let bossEnemy = { type: 'boss_cedar', x: 55, y: 194, alive: true, px: 55 * TILE_SIZE + 16, py: 194 * TILE_SIZE + 16 };
  let boss1Enemy = { type: 'boss_guardian', x: 80, y: 55, alive: true, px: 80 * TILE_SIZE + 16, py: 55 * TILE_SIZE + 16 };
  let boss2Enemy = { type: 'boss_birch', x: 88, y: 155, alive: true, px: 88 * TILE_SIZE + 16, py: 155 * TILE_SIZE + 16 };
  let currentMapId = 'world';
  let currentZone = null;
  let encounterSteps = 0;
  let warpCooldown = 0;

  function getZoneAt(px, py) {
    if (currentMapId !== 'world') return { name: '屋内', safe: true, id: 'indoor' };
    const tx = Math.floor(px / TILE_SIZE), ty = Math.floor(py / TILE_SIZE);
    for (const z of ZONES) if (tx >= z.x && tx < z.x+z.w && ty >= z.y && ty < z.y+z.h) return z;
    return null;
  }

  return {
    TILE_SIZE, ZONES,
    
    init() {
      bossEnemy = { type: 'boss_cedar', x: 55, y: 194, alive: true, px: 55 * TILE_SIZE + 16, py: 194 * TILE_SIZE + 16 };
      boss1Enemy = { type: 'boss_guardian', x: 80, y: 55, alive: true, px: 80 * TILE_SIZE + 16, py: 55 * TILE_SIZE + 16 };
      boss2Enemy = { type: 'boss_birch', x: 88, y: 155, alive: true, px: 88 * TILE_SIZE + 16, py: 155 * TILE_SIZE + 16 };
      currentMapId = 'world';
      currentZone = null;
      encounterSteps = 0;
      warpCooldown = 0;
    },

    updateZone() {
      const z = getZoneAt(Player.state.mapX, Player.state.mapY);
      if (z && (!currentZone || z.id !== currentZone.id)) {
        currentZone = z;
        if(z.name !== '屋内') UI.showNotification(z.name, 2000);
      }
    },
    getCurrentZone() { return currentZone; },

    draw(ctx, canvasW, canvasH) {
      if(warpCooldown > 0) warpCooldown--;
      const curMap = MAPS[currentMapId];
      if(!curMap) return;

      const camX = Player.state.mapX - canvasW / 2 + TILE_SIZE / 2;
      const camY = Player.state.mapY - canvasH / 2 + TILE_SIZE / 2;
      const startTX = Math.max(0, Math.floor(camX / TILE_SIZE) - 1);
      const startTY = Math.max(0, Math.floor(camY / TILE_SIZE) - 1);
      const endTX = Math.min(curMap.w, Math.ceil((camX + canvasW) / TILE_SIZE) + 1);
      const endTY = Math.min(curMap.h, Math.ceil((camY + canvasH) / TILE_SIZE) + 1);

      for (let y = startTY; y < endTY; y++) {
        for (let x = startTX; x < endTX; x++) {
          const tile = curMap.data[y][x];
          const drawX = x * TILE_SIZE - camX;
          const drawY = y * TILE_SIZE - camY;

          ctx.fillStyle = TILE_COLORS[tile] || '#000';
          ctx.fillRect(drawX, drawY, TILE_SIZE, TILE_SIZE);

          // Walls
          if (tile === 1 || tile === 15) { ctx.fillStyle = (tile===1)?'#3a2a1a':'#1f1f26'; ctx.fillRect(drawX + 2, drawY + 2, TILE_SIZE - 4, TILE_SIZE - 4); }
          // Grass
          if (tile === 2) {
            ctx.fillStyle = '#2a5a2a';
            for (let g = 0; g < 3; g++) { const gx = drawX + 4 + g * 10, gy = drawY + 20; ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx+4, gy-12); ctx.lineTo(gx+8, gy); ctx.fill(); }
          }
          // Save
          if (tile === 3) {
            ctx.fillStyle = '#ffcc33'; ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now() / 500); ctx.beginPath(); ctx.arc(drawX + 16, drawY + 16, 8, 0, Math.PI * 2); ctx.fill(); ctx.globalAlpha = 1;
          }
          if (tile === 4) { ctx.fillStyle = '#5a1a1a'; ctx.globalAlpha = 0.3 + 0.2 * Math.sin(Date.now() / 800); ctx.fillRect(drawX, drawY, 32, 32); ctx.globalAlpha = 1; }
          if (tile === 5 || tile === 14) { ctx.fillStyle = (tile===5)?'#35353d':'#3a3a44'; ctx.fillRect(drawX + 1, drawY + 1, 30, 30); }
          if (tile === 6) { ctx.fillStyle = '#302a22'; ctx.fillRect(drawX, drawY, 32, 32); ctx.fillStyle = '#3a3428'; ctx.fillRect(drawX + 4, drawY + 4, 4, 4); ctx.fillRect(drawX + 20, drawY + 20, 4, 4); }
          if (tile === 7) { ctx.fillStyle = '#1a3a6a'; ctx.fillRect(drawX, drawY, 32, 32); ctx.fillStyle = '#2a4a7a'; ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now() / 600 + x + y); ctx.fillRect(drawX + 4, drawY + 8, 24, 3); ctx.fillRect(drawX + 8, drawY + 20, 20, 3); ctx.globalAlpha = 1; }
          if (tile === 8) { ctx.fillStyle = '#ffffff'; ctx.fillRect(drawX + 8, drawY + 8, 4, 4); ctx.fillRect(drawX + 24, drawY + 24, 4, 4); }
          if (tile === 9) { ctx.fillStyle = '#ffffff'; ctx.fillRect(drawX + 2, drawY + 2, 28, 8); }
          if (tile === 10) { ctx.fillStyle = '#ffffff'; for (let g=0; g<3; g++) { const gx = drawX + 4 + g * 10, gy = drawY + 20; ctx.beginPath(); ctx.moveTo(gx, gy); ctx.lineTo(gx+4, gy-12); ctx.lineTo(gx+8, gy); ctx.fill(); } }
          if (tile === 12) { ctx.fillStyle = '#3a2a2a'; ctx.fillRect(drawX+2, drawY+2, 28, 28); }
          if (tile === 13) { ctx.fillStyle = '#3a1e0c'; ctx.fillRect(drawX+4, drawY+4, 24, 28); ctx.fillStyle = '#1a0a00'; ctx.fillRect(drawX+22, drawY+18, 4, 4); }
        }
      }

      this.drawNPCs(ctx, camX, camY, canvasW, canvasH, curMap);

      const px = Player.state.mapX - camX, py = Player.state.mapY - camY;
      const cx = px + 9.6, cy = py + 3.2;

      ctx.fillStyle = '#ffddaa'; ctx.fillRect(cx - 4, cy, 8, 8);
      ctx.fillStyle = '#664422'; ctx.fillRect(cx - 5, cy - 1, 10, 4);
      ctx.fillStyle = '#3366cc'; ctx.fillRect(cx - 5, cy + 8, 10, 10); ctx.fillRect(cx - 8, cy + 9, 3, 8); ctx.fillRect(cx + 5, cy + 9, 3, 8);
      ctx.fillStyle = '#2a2a4a'; ctx.fillRect(cx - 4, cy + 18, 4, 6); ctx.fillRect(cx, cy + 18, 4, 6);
      ctx.fillStyle = '#885533'; ctx.fillRect(cx - 5, cy + 24, 5, 2); ctx.fillRect(cx, cy + 24, 5, 2);

      if (currentMapId === 'world' && bossEnemy.alive) {
        const bx = bossEnemy.px - camX, by = bossEnemy.py - camY;
        if (bx > -64 && bx < canvasW + 64 && by > -64 && by < canvasH + 64) {
          ctx.fillStyle = '#5a3a1a'; ctx.fillRect(bx - 16, by - 24, 32, 48);
          ctx.fillStyle = '#2a6a2a'; ctx.beginPath(); ctx.moveTo(bx, by - 40); ctx.lineTo(bx - 24, by - 8); ctx.lineTo(bx + 24, by - 8); ctx.fill();
        }
      }
      // ボス1シンボル（森の番人）
      if (currentMapId === 'world' && boss1Enemy.alive) {
        const bx = boss1Enemy.px - camX, by = boss1Enemy.py - camY;
        if (bx > -64 && bx < canvasW + 64 && by > -64 && by < canvasH + 64) {
          ctx.fillStyle = '#2a7a3a'; ctx.beginPath(); ctx.arc(bx, by, 16, 0, Math.PI * 2); ctx.fill();
          ctx.fillStyle = '#44cc44';
          for (let i = 0; i < 3; i++) { const a = (i*120-90)*Math.PI/180; ctx.beginPath(); ctx.moveTo(bx+Math.cos(a)*12, by+Math.sin(a)*12-8); ctx.lineTo(bx+Math.cos(a)*12-5, by+Math.sin(a)*12+4); ctx.lineTo(bx+Math.cos(a)*12+5, by+Math.sin(a)*12+4); ctx.fill(); }
          ctx.fillStyle = '#ffff44'; ctx.beginPath(); ctx.arc(bx-5, by, 3, 0, Math.PI*2); ctx.arc(bx+5, by, 3, 0, Math.PI*2); ctx.fill();
        }
      }
      // ボス2シンボル（白樺）
      if (currentMapId === 'world' && boss2Enemy.alive) {
        const bx = boss2Enemy.px - camX, by = boss2Enemy.py - camY;
        if (bx > -64 && bx < canvasW + 64 && by > -64 && by < canvasH + 64) {
          ctx.fillStyle = '#e0d8c0'; ctx.fillRect(bx - 8, by - 16, 16, 40);
          ctx.fillStyle = '#aaccaa'; ctx.beginPath(); ctx.moveTo(bx, by - 32); ctx.lineTo(bx - 18, by - 4); ctx.lineTo(bx + 18, by - 4); ctx.fill();
          ctx.fillStyle = '#6688aa'; ctx.beginPath(); ctx.arc(bx-3, by+4, 2, 0, Math.PI*2); ctx.arc(bx+3, by+4, 2, 0, Math.PI*2); ctx.fill();
        }
      }
    },

    drawNPCs(ctx, camX, camY, canvasW, canvasH, curMap) {
      if(!curMap.npcs) return;
      for (const npc of curMap.npcs) {
        const nx = npc.x * 32 + 16 - camX, ny = npc.y * 32 + 16 - camY;
        if (nx < -32 || nx > canvasW + 32 || ny < -32 || ny > canvasH + 32) continue;

        // イベントオブジェクト（看板、扉など）は透明扱いとして描画しない代わりに、常に光のシンボルなどを表示
        if (npc.isObject) {
          ctx.fillStyle = '#ffffcc'; ctx.font = '16px "DotGothic16", monospace'; ctx.textAlign = 'center';
          ctx.globalAlpha = 0.6 + 0.4 * Math.sin(Date.now() / 400 + nx); 
          ctx.fillText('✨', nx, ny - 4); 
          ctx.globalAlpha = 1;

          // 近づいた時はさらにアピール（▼）
          const px = Player.state.mapX + 9.6, py = Player.state.mapY + 9.6;
          const npcPx = npc.x * 32 + 16, npcPy = npc.y * 32 + 16;
          if (Math.hypot(px - npcPx, py - npcPy) < 48) {
            ctx.fillStyle = '#ffcc33'; ctx.font = '12px "DotGothic16", monospace'; ctx.textAlign = 'center';
            ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now() / 300); ctx.fillText('▼', nx, ny - 24); ctx.globalAlpha = 1;
          }
          continue; 
        }

        const colors = { 'doctor':'#44aa44', 'kid1':'#ffaa33', 'old_man':'#888888', 'shop_sugina':'#cc8833', 'merchant':'#cc8833', 'researcher':'#8844aa', 'salary_man':'#336699', 'shop_green':'#cc8833', 'ex_member':'#557744', 'soldier':'#446644', 'shop_shida':'#cc8833', 'priestess':'#cc4488', 'villager':'#668844', 'kid2':'#ffaa33', 'survivor': '#776655' };
        const color = colors[npc.id] || '#aaaaaa';

        ctx.fillStyle = color; ctx.fillRect(nx - 5, ny - 8, 10, 16);
        ctx.fillStyle = '#ffddaa'; ctx.beginPath(); ctx.arc(nx, ny - 14, 6, 0, Math.PI * 2); ctx.fill();
        if (npc.isShop) { ctx.fillStyle = '#ffcc00'; ctx.font = '10px "DotGothic16", monospace'; ctx.textAlign = 'center'; ctx.fillText('$', nx, ny - 24); }

        const px = Player.state.mapX + 9.6, py = Player.state.mapY + 9.6;
        const npcPx = npc.x * 32 + 16, npcPy = npc.y * 32 + 16;
        if (Math.hypot(px - npcPx, py - npcPy) < 64) {
          ctx.fillStyle = '#ffffff'; ctx.font = '12px "DotGothic16", monospace'; ctx.textAlign = 'center';
          ctx.globalAlpha = 0.5 + 0.3 * Math.sin(Date.now() / 300); ctx.fillText('💬', nx, ny - 28); ctx.globalAlpha = 1;
        }
      }
    },

    updatePlayerMovement() {
      let MAP_SPEED = 1.5; 
      
      // 花粉の霧ハザードによる移動速度低下
      if (currentZone && currentZone.hazard === 'pollen_fog') {
        MAP_SPEED = 1.0;
        // 防具による軽減判定 (防具があれば速度低下を緩和)
        /* if (Player.state.armor) { MAP_SPEED = 1.2; } */
      }

      let nx = Player.state.mapX, ny = Player.state.mapY;

      if (Input.isDown('up')) ny -= MAP_SPEED;
      if (Input.isDown('down')) ny += MAP_SPEED;
      if (Input.isDown('left')) nx -= MAP_SPEED;
      if (Input.isDown('right')) nx += MAP_SPEED;

      const curMap = MAPS[currentMapId];
      if(!curMap) return false;

      // Warp check
      if (curMap.warps && warpCooldown <= 0) {
        const txPlayer = Math.floor((Player.state.mapX + 9.6) / 32), tyPlayer = Math.floor((Player.state.mapY + 9.6) / 32);
        for (const w of curMap.warps) {
          if (txPlayer === w.x && tyPlayer === w.y) {
            // 電源が入っていないと避難所に入れない処理
            if (w.target === 'ruins_shelter' && !Player.state.flags.powerOn) {
              if (Input.isJustPressed('up') || Input.isJustPressed('confirm')) {
                // UI表示はイベント側で行うため、ここでは移動だけブロック
              }
              continue; 
            }
            
            // 隠し地下室の解放チェック
            if (w.target === 'ruins_basement') {
              if (!(Player.state.flags.readDiaryCount >= 2 && Player.state.flags.learnedForestTruth)) {
                if (Input.isJustPressed('up') || Input.isJustPressed('confirm')) {
                  UI.showNotification('固く閉ざされている。もっと町の手がかりを探そう…', 2000);
                }
                continue;
              }
            }

            currentMapId = w.target;
            Player.state.mapX = w.tx * 32 + 6;
            Player.state.mapY = w.ty * 32 + 6;
            warpCooldown = 30; 
            document.getElementById('screen-flash').classList.add('active'); 
            setTimeout(() => document.getElementById('screen-flash').classList.remove('active'), 300);
            return true;
          }
        }
      }

      const checkTile = (px, py) => {
        const tx = Math.floor(px / 32), ty = Math.floor(py / 32);
        if (ty < 0 || ty >= curMap.h || tx < 0 || tx >= curMap.w) return 1;
        const t = curMap.data[ty][tx];
        // 1=壁, 4=廃墟記念碑, 7=水, 9=雪壁, 12=洞窟壁, 15=暗い壁
        return (t===1 || t===4 || t===7 || t===9 || t===12 || t===15) ? 1 : 0;
      };

      const size = 19.2;
      if (checkTile(nx, Player.state.mapY) === 0 && checkTile(nx + size, Player.state.mapY + size) === 0) Player.state.mapX = nx;
      if (checkTile(Player.state.mapX, ny) === 0 && checkTile(Player.state.mapX + size, ny + size) === 0) Player.state.mapY = ny;

      if (nx !== Player.state.mapX || ny !== Player.state.mapY) encounterSteps++;
      return false;
    },

    checkEncounter() {
      if (currentMapId !== 'world' || !currentZone || currentZone.safe || currentZone.boss) return null;
      if (!currentZone.encounters || currentZone.encounters.length === 0) return null;
      if (Math.random() < 0.0025) {
        const enemies = currentZone.encounters;
        return enemies[Math.floor(Math.random() * enemies.length)];
      }
      return null;
    },

    checkNPCContact() {
      const curMap = MAPS[currentMapId];
      if(!curMap || !curMap.npcs) return null;
      const px = Player.state.mapX + 9.6, py = Player.state.mapY + 9.6;
      for (const npc of curMap.npcs) {
        const npcPx = npc.x * 32 + 16, npcPy = npc.y * 32 + 16;
        if (Math.hypot(px - npcPx, py - npcPy) < 48) return npc;
      }
      return null;
    },

    checkBossContact() {
      if (currentMapId !== 'world') return null;
      const px = Player.state.mapX + 9.6, py = Player.state.mapY + 9.6;
      // ボス1（森の番人）
      if (boss1Enemy.alive && Math.abs(py - boss1Enemy.py) < 30 && Math.abs(px - boss1Enemy.px) < 400) {
        return { ...boss1Enemy, bossId: 'boss1' };
      }
      // ボス2（白樺）
      if (boss2Enemy.alive && Math.abs(py - boss2Enemy.py) < 30 && Math.abs(px - boss2Enemy.px) < 400) {
        return { ...boss2Enemy, bossId: 'boss2' };
      }
      // ラスボス
      if (bossEnemy.alive && Math.abs(py - bossEnemy.py) < 30 && Math.abs(px - bossEnemy.px) < 400) {
        return { ...bossEnemy, bossId: 'final' };
      }
      return null;
    },

    removeBoss() { bossEnemy.alive = false; },

    checkSavePoint() {
      const curMap = MAPS[currentMapId];
      const tx = Math.floor((Player.state.mapX + 9.6) / 32), ty = Math.floor((Player.state.mapY + 9.6) / 32);
      return curMap && curMap.data[ty] && curMap.data[ty][tx] === 3;
    },

    removeEnemy(id) {
      if (id === 'boss') bossEnemy.alive = false;
      if (id === 'boss1') boss1Enemy.alive = false;
      if (id === 'boss2') boss2Enemy.alive = false;
    },
    getActiveEnemies() {
      const list = [];
      if (bossEnemy.alive) list.push(bossEnemy);
      if (boss1Enemy.alive) list.push(boss1Enemy);
      if (boss2Enemy.alive) list.push(boss2Enemy);
      return list;
    },
    current() { return { name: currentZone ? currentZone.name : 'ワールド' }; },
  };
})();

</script>

const Enemy = (() => {
  // 敵タイプ定義
  const TYPES = {
    grass: {

      exp: 100,
      gold: 500,
      color: '#5a3a1a',

      isBoss: true,

    boss_guardian: {
      name: '森の番人 モリマモル',

  };

  // 弾幕パターン生成
  const PATTERNS = {
    /** 円形拡散弾（遅い）*/
    radial_slow(cx, cy, timer) {
      const bullets = [];
      if (timer % 60 === 0) {
        for (let i = 0; i < 360; i += 30) {
          const rad = (i + timer) * Math.PI / 180;
          bullets.push({
            x: cx, y: cy,
            vx: Math.cos(rad) * 1.2,
            vy: Math.sin(rad) * 1.2,
            radius: 5,
            color: '#aaff44',
          });
        }
      }
      return bullets;
    },

    /** 円形拡散弾（速い）*/
    radial_fast(cx, cy, timer) {
      const bullets = [];
      if (timer % 40 === 0) {
        for (let i = 0; i < 360; i += 20) {
          const rad = (i + timer * 2) * Math.PI / 180;
          bullets.push({
            x: cx, y: cy,
            vx: Math.cos(rad) * 1.8,
            vy: Math.sin(rad) * 1.8,
            radius: 4,
            color: '#ff88cc',
          });
        }
      }
      return bullets;
    },

    /** 狙い撃ち＋散弾 */
    aimed_scatter(cx, cy, timer, targetX, targetY) {
      const bullets = [];
      if (timer % 50 === 0) {
        const dx = targetX - cx;
        const dy = targetY - cy;
        const angle = Math.atan2(dy, dx);
        for (let i = -2; i <= 2; i++) {
          const a = angle + i * 0.15;
          bullets.push({
            x: cx, y: cy,
            vx: Math.cos(a) * 2.2,
            vy: Math.sin(a) * 2.2,
            radius: 5,
            color: '#44ccaa',
          });
        }
      }
      return bullets;
    },

    /** ボスパターン */
    boss(cx, cy, timer, targetX, targetY, phase, enemyObj, screenW, screenH) {
      const bullets = [];
      const w = screenW || 640;
      const h = screenH || 480;
      const basePhase = phase !== undefined ? phase : 0;
      let currentPhase;
      
      if (enemyObj && enemyObj.isForm2) {
        currentPhase = 10 + (basePhase % 3);
      } else {
        currentPhase = basePhase % 7;
      }

      switch (currentPhase) {
        case 0: // ① 花粉拡散（全方向弾）
          if (timer % 30 === 0) {
            const offset = timer * 3;
            for (let i = 0; i < 360; i += 15) {
              const rad = (i + offset) * Math.PI / 180;
              bullets.push({
                x: cx, y: cy,
                vx: Math.cos(rad) * 1.5,
                vy: Math.sin(rad) * 1.5,
                radius: 4,
                color: '#ffee44',
              });
            }
          }
          break;

        case 1: // ② 渦巻き弾
          if (timer % 5 === 0) {
            const spiralAngle = timer * 8 * Math.PI / 180;
            bullets.push({
              x: cx, y: cy,
              vx: Math.cos(spiralAngle) * 2,
              vy: Math.sin(spiralAngle) * 2,
              radius: 5,
              color: '#44ff88',
            });
            bullets.push({
              x: cx, y: cy,
              vx: Math.cos(spiralAngle + Math.PI) * 2,
              vy: Math.sin(spiralAngle + Math.PI) * 2,
              radius: 5,
              color: '#88ff44',
            });
          }
          break;

        case 2: // ③ 粉塵爆発
          {
            const subTimer = timer % 300;
            // 警告表示期間
            if (subTimer < 120) {
              if (subTimer % 40 === 0) {
                const angle = Math.atan2(targetY - cy, targetX - cx);
                for (let i = -1; i <= 1; i++) {
                  const a = angle + i * 0.3;
                  bullets.push({
                    x: cx, y: cy,
                    vx: Math.cos(a) * 1.8,
                    vy: Math.sin(a) * 1.8,
                    radius: 6,
                    color: '#ff6644',
                    statusEffect: 'sneeze'
                  });
                }
              }
            }
            // 爆発
            if (subTimer === 150) {
              for (let i = 0; i < 360; i += 8) {
                const rad = i * Math.PI / 180;
                bullets.push({
                  x: cx, y: cy,
                  vx: Math.cos(rad) * 2.5,
                  vy: Math.sin(rad) * 2.5,
                  radius: 5,
                  color: '#ff4422',
                  statusEffect: 'sneeze'
                });
              }
            }
          }
          break;

        case 3: // ④ 木の葉の壁（全画面なぎ払い・安地なし隙間抜け、同時2〜3枚制限）
          if (timer % 160 === 0) {
            const isLeft = (Math.floor(timer / 160) % 2) === 0;
            // 画面幅wを基準とし、画面外端から生成
            const startX = isLeft ? -50 : w + 50;
            // 速度を遅く調整
            const spdX = isLeft ? 1.5 : -1.5;
            // 隙間の中心Y座標をランダム決定 (画面高さを想定)
            const gapY = Math.random() * (h - 100) + 50;
            
            // 画面上下(-50〜h+50)まで完全にカバーする弾を配置
            for (let y = -50; y <= h + 50; y += 22) {
              if (y < gapY - 40 || y > gapY + 40) {
                 bullets.push({x: startX, y: y, vx: spdX, vy: 0, radius: 8, color: isLeft ? '#33aa44' : '#228833', statusEffect: 'sneeze'});
              }
            }
          }
          break;

        case 4: // ⑤ 必殺：巨木の怒り（高速自機狙い＋巨大弾）
          if (timer % 30 === 0) {
            const dx = targetX - cx;
            const dy = targetY - cy;
            const angle = Math.atan2(dy, dx);
            for (let i = -1; i <= 1; i++) {
              const a = angle + i * 0.15;
              bullets.push({
                x: cx, y: cy,
                vx: Math.cos(a) * 3.0,
                vy: Math.sin(a) * 3.0,
                radius: 5,
                color: '#ff2222',
              });
            }
          }
          if (timer % 100 === 0) {
             const dx = targetX - cx;
             const dy = targetY - cy;
             const angle = Math.atan2(dy, dx);
             bullets.push({
               x: cx, y: cy,
               vx: Math.cos(angle) * 1.8,
               vy: Math.sin(angle) * 1.8,
               radius: 15,
               color: '#aa3300',
               statusEffect: 'sneeze'
             });
          }
          break;

        case 5: // ⑥ 狂気の森（3種の異なる動きの弾幕）
          // 1. 中心からの渦巻き（遅め、ピンク）
          if (timer % 8 === 0) {
            const rad = timer * 13 * Math.PI / 180;
            bullets.push({x: cx, y: cy, vx: Math.cos(rad) * 1.5, vy: Math.sin(rad) * 1.5, radius: 4, color: '#ff44aa'});
          }
          // 2. 上からの雨（ランダムX、下へ固定落下、ブルー）
          if (timer % 10 === 0) {
            const rx = Math.random() * w;
            bullets.push({x: rx, y: -10, vx: 0, vy: 2.5 + Math.random(), radius: 5, color: '#44aaff'});
          }
          // 3. 左端から右へ進むサイン波弾（緑）
          if (timer % 20 === 0) {
            const sy = cy + Math.sin(timer * 0.1) * 70;
            bullets.push({x: -10, y: sy, vx: 2.0, vy: Math.cos(timer * 0.1) * 1.5, radius: 6, color: '#44ff44'});
          }
          break;

        case 6: // ⑦ 逃避不可避（放射状黄弾＋渦巻き赤弾）
          // 黄色：放射状に全方向一斉発射
          if (timer % 60 === 0) {
            for (let i = 0; i < 360; i += 20) {
              const rad = (i + timer * 2) * Math.PI / 180;
              bullets.push({x: cx, y: cy, vx: Math.cos(rad) * 1.2, vy: Math.sin(rad) * 1.2, radius: 4, color: '#ffff44'});
            }
          }
          // 赤：渦巻き状に回転しながら発射
          if (timer % 8 === 0) {
            const spiralAngle = timer * 7 * Math.PI / 180;
            bullets.push({x: cx, y: cy, vx: Math.cos(spiralAngle) * 2.5, vy: Math.sin(spiralAngle) * 2.5, radius: 5, color: '#ff2200'});
            bullets.push({x: cx, y: cy, vx: Math.cos(spiralAngle + Math.PI) * 2.5, vy: Math.sin(spiralAngle + Math.PI) * 2.5, radius: 5, color: '#ff2200'});
          }
          break;

        // --- 第二形態（真・スギノオウ）専用パターン ---
        case 10: // 狂乱の嵐 (Pattern A) - レーザー3Way＋双方向螺旋
          if (timer % 12 === 0) {
            const dx = targetX - cx;
            const dy = targetY - cy;
            const angle = Math.atan2(dy, dx);
            for(let i = -1; i <= 1; i++){
               const a = angle + i * 0.15;
               bullets.push({x: cx, y: cy, vx: Math.cos(a) * 2.5, vy: Math.sin(a) * 2.5, radius: 6, color: '#ff1111'});
            }
          }
          if (timer % 6 === 0) {
             const rAngle1 = timer * 0.1;
             const rAngle2 = -timer * 0.1;
             for(let i = 0; i < 3; i++){
                 bullets.push({x: cx, y: cy, vx: Math.cos(rAngle1 + Math.PI*2/3*i)*2, vy: Math.sin(rAngle1 + Math.PI*2/3*i)*2, radius: 5, color: '#ff44aa'});
                 bullets.push({x: cx, y: cy, vx: Math.cos(rAngle2 + Math.PI*2/3*i)*2, vy: Math.sin(rAngle2 + Math.PI*2/3*i)*2, radius: 5, color: '#ffaa44'});
             }
          }
          break;

        case 11: // 圧殺の結界 (Pattern B) - 全方位弾＋自機狙い
          if (timer % 40 === 0) {
            for (let i = 0; i < 360; i += 15) {
              const rad = i * Math.PI / 180;
              bullets.push({x: cx, y: cy, vx: Math.cos(rad) * 2.0, vy: Math.sin(rad) * 2.0, radius: 5, color: '#ffdd00'});
            }
          }
          if (timer % 40 === 0) {
            const dx = targetX - cx;
            const dy = targetY - cy;
            const angle = Math.atan2(dy, dx);
            for(let i = -1; i <= 1; i++){
               const a = angle + i * 0.12;
               bullets.push({x: cx, y: cy, vx: Math.cos(a) * 3.0, vy: Math.sin(a) * 3.0, radius: 7, color: '#ff5500'});
            }
          }
          break;

        case 12: // 終焉の樹海 (Pattern C) - 横波＋巨大落下弾
          if (timer % 10 === 0) {
             const midY = h / 2;
             const wave1 = midY + Math.sin(timer * 0.05) * (h * 0.55);
             const wave2 = midY + Math.sin(timer * 0.05 + Math.PI) * (h * 0.55);
             bullets.push({x: -20, y: wave1, vx: 3, vy: 0, radius: 6, color: '#ff00ff'});
             bullets.push({x: w + 20, y: wave2, vx: -3, vy: 0, radius: 6, color: '#00ffff'});
          }
          if (timer % 60 === 0) {
            bullets.push({x: Math.random() * w, y: -40, vx: 0, vy: 1.5, radius: 20, color: '#aa0000'});
          }
          break;
      }
      return bullets;
    },

    /** 自機狙い＋円形拡散弾の複合 */
    aimed_and_radial(cx, cy, timer, targetX, targetY) {
      const bullets = [];
      // 30フレームごとに自機狙い弾
      if (timer % 30 === 0) {
        const dx = targetX - cx;
        const dy = targetY - cy;
        const angle = Math.atan2(dy, dx);
        bullets.push({

          vy: Math.sin(angle) * 2.0,

          color: '#ff4444',
        });

      // 80フレームごとに円形拡散（遅め）
      if (timer % 80 === 0) {
        for (let i = 0; i < 360; i += 45) {
          const rad = (i + timer) * Math.PI / 180;
          bullets.push({
            x: cx, y: cy,
            vx: Math.cos(rad) * 1.5,
            vy: Math.sin(rad) * 1.5,
            radius: 4,
            color: '#33ffaa',
          });
        }
      }
      return bullets;
    },

    /** 渦巻き弾＋自機狙いの複合 */
    spiral_aimed(cx, cy, timer, targetX, targetY) {
      const bullets = [];
      // 渦巻き弾
      if (timer % 6 === 0) {
        const rad = timer * 10 * Math.PI / 180;
        bullets.push({
          x: cx, y: cy,
          vx: Math.cos(rad) * 1.5,
          vy: Math.sin(rad) * 1.5,
          radius: 4,
          color: '#ff88cc',
        });
      }
      // 45フレームごとに自機狙い3WAY
      if (timer % 45 === 0) {
        const dx = targetX - cx;
        const dy = targetY - cy;
        const angle = Math.atan2(dy, dx);
        for (let i = -1; i <= 1; i++) {
          const a = angle + i * 0.2;
          bullets.push({
            x: cx, y: cy,
            vx: Math.cos(a) * 2.5,
            vy: Math.sin(a) * 2.5,
            radius: 5,
            color: '#ee4422',
          });
        }
      }
      return bullets;
    },

    /** ボス1: 森の番人パターン */
    boss_guardian(cx, cy, timer, targetX, targetY) {
      const bullets = [];
      const phase = Math.floor(timer / 300) % 3;

      switch (phase) {
        case 0: // 渦巻き＋自機狙い
          if (timer % 12 === 0) {
            const rad = timer * 7 * Math.PI / 180;
            bullets.push({ x: cx, y: cy, vx: Math.cos(rad) * 1.5, vy: Math.sin(rad) * 1.5, radius: 5, color: '#44cc44' });
            bullets.push({ x: cx, y: cy, vx: Math.cos(rad + Math.PI) * 1.5, vy: Math.sin(rad + Math.PI) * 1.5, radius: 5, color: '#88ff44' });
          }
          if (timer % 50 === 0) {
            const angle = Math.atan2(targetY - cy, targetX - cx);
            for (let i = -1; i <= 1; i++) {
              const a = angle + i * 0.2;
              bullets.push({ x: cx, y: cy, vx: Math.cos(a) * 1.8, vy: Math.sin(a) * 1.8, radius: 5, color: '#22aa22' });
            }
          }
          break;
        case 1: // 葉っぱの嵐（上から降ってくる）
          if (timer % 16 === 0) {
            const rx = Math.random() * 400;
            bullets.push({ x: rx, y: -10, vx: Math.sin(timer * 0.03) * 1.2, vy: 1.6, radius: 6, color: '#33bb33' });
          }
          if (timer % 80 === 0) {
            for (let i = 0; i < 360; i += 30) {
              const rad = (i + timer * 2) * Math.PI / 180;
              bullets.push({ x: cx, y: cy, vx: Math.cos(rad) * 1.2, vy: Math.sin(rad) * 1.2, radius: 4, color: '#66dd44' });
            }
          }
          break;
        case 2: // 大量散弾
          if (timer % 40 === 0) {
            const angle = Math.atan2(targetY - cy, targetX - cx);
            for (let i = -2; i <= 2; i++) {
              const a = angle + i * 0.15;
              bullets.push({ x: cx, y: cy, vx: Math.cos(a) * 2.0, vy: Math.sin(a) * 2.0, radius: 4, color: '#44aa44' });
            }
          }
          break;
      }
      return bullets;
    },

    /** ボス2: 白樺パターン */
    boss_birch(cx, cy, timer, targetX, targetY) {
      const bullets = [];
      const phase = Math.floor(timer / 350) % 3;

      switch (phase) {
        case 0: // 白い放射弾幕
          if (timer % 45 === 0) {
            const offset = timer * 3;
            for (let i = 0; i < 360; i += 20) {
              const rad = (i + offset) * Math.PI / 180;
              bullets.push({ x: cx, y: cy, vx: Math.cos(rad) * 1.6, vy: Math.sin(rad) * 1.6, radius: 5, color: '#e0e0e0' });
            }
          }
          if (timer % 25 === 0) {
            const angle = Math.atan2(targetY - cy, targetX - cx);
            bullets.push({ x: cx, y: cy, vx: Math.cos(angle) * 2.5, vy: Math.sin(angle) * 2.5, radius: 6, color: '#aabbcc' });
          }
          break;
        case 1: // 二重螺旋 + 落下弾
          if (timer % 6 === 0) {
            const rad1 = timer * 0.09;
            const rad2 = -timer * 0.09;
            bullets.push({ x: cx, y: cy, vx: Math.cos(rad1) * 2.0, vy: Math.sin(rad1) * 2.0, radius: 5, color: '#ccddee' });
            bullets.push({ x: cx, y: cy, vx: Math.cos(rad2) * 2.0, vy: Math.sin(rad2) * 2.0, radius: 5, color: '#88aacc' });
          }
          if (timer % 40 === 0) {
            const rx = Math.random() * 400;
            bullets.push({ x: rx, y: -20, vx: 0, vy: 2.5, radius: 8, color: '#ffffff' });
          }
          break;
        case 2: // 自機狙い散弾 + 全方位
          if (timer % 20 === 0) {
            const angle = Math.atan2(targetY - cy, targetX - cx);
            for (let i = -2; i <= 2; i++) {
              const a = angle + i * 0.15;
              bullets.push({ x: cx, y: cy, vx: Math.cos(a) * 2.8, vy: Math.sin(a) * 2.8, radius: 5, color: '#ddddff' });
            }
          }
          if (timer % 60 === 0) {
            for (let i = 0; i < 360; i += 25) {
              const rad = i * Math.PI / 180;
              bullets.push({ x: cx, y: cy, vx: Math.cos(rad) * 1.3, vy: Math.sin(rad) * 1.3, radius: 4, color: '#bbccdd' });
            }
          }
          break;
      }
      return bullets;
    },
  };

  return {
    TYPES,
    PATTERNS,

    /** 敵インスタンス生成 */
    create(type) {
      const def = TYPES[type];
      if (!def) return null;
      return {
        type,
        name: def.name,
        hp: def.hp,
        maxHp: def.maxHp,
        attack: def.attack,
        exp: def.exp,
        gold: def.gold,
        color: def.color,
        bulletPattern: def.bulletPattern,
        description: def.description,
        isBoss: !!def.isBoss,
      };
    },

    /** 弾幕生成 */
    spawnBullets(patternName, cx, cy, timer, targetX, targetY, phase, enemyObj, w, h) {
      const pattern = PATTERNS[patternName];
      if (!pattern) return [];
      return pattern(cx, cy, timer, targetX, targetY, phase, enemyObj, w, h);
    },

    /** 敵のCanvas描画 */
    drawEnemy(ctx, enemy, w, h) {
      const cx = w / 2;
      const cy = h / 2;

      if (enemy.type === 'boss_cedar') {
        const isForm2 = enemy.isForm2;
        // 幹
        ctx.fillStyle = isForm2 ? '#3a1a0a' : '#5a3a1a';
        ctx.fillRect(cx - 15, cy - 10, 30, 60);
        // 葉
        ctx.fillStyle = isForm2 ? '#882222' : '#2a6a2a';
        ctx.beginPath();
        ctx.moveTo(cx, cy - 60);
        ctx.lineTo(cx - 45, cy + 5);
        ctx.lineTo(cx + 45, cy + 5);
        ctx.fill();
        ctx.fillStyle = isForm2 ? '#aa3333' : '#3a7a3a';
        ctx.beginPath();
        ctx.moveTo(cx, cy - 45);
        ctx.lineTo(cx - 35, cy + 5);
        ctx.lineTo(cx + 35, cy + 5);
        ctx.fill();
        // 目
        ctx.fillStyle = isForm2 ? '#ffff00' : '#ff3333';
        ctx.beginPath();
        ctx.arc(cx - 8, cy + 10, 4, 0, Math.PI * 2);
        ctx.arc(cx + 8, cy + 10, 4, 0, Math.PI * 2);
        ctx.fill();
      } else if (enemy.type === 'flower') {
        // 花びら
        ctx.fillStyle = enemy.color;
        for (let i = 0; i < 6; i++) {
          const angle = (i * 60 + Date.now() / 50) * Math.PI / 180;
          const px = cx + Math.cos(angle) * 20;
          const py = cy + Math.sin(angle) * 20;
          ctx.beginPath();
          ctx.arc(px, py, 10, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.fillStyle = '#ffee44';
        ctx.beginPath();
        ctx.arc(cx, cy, 12, 0, Math.PI * 2);
        ctx.fill();
        // 目
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(cx - 4, cy - 2, 2, 0, Math.PI * 2);
        ctx.arc(cx + 4, cy - 2, 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (enemy.type === 'ranger') {
        // 体
        ctx.fillStyle = '#44aa88';
        ctx.fillRect(cx - 12, cy - 10, 24, 40);
        // 頭
        ctx.fillStyle = '#ddbb88';
        ctx.beginPath();
        ctx.arc(cx, cy - 20, 14, 0, Math.PI * 2);
        ctx.fill();
        // 帽子
        ctx.fillStyle = '#336633';
        ctx.fillRect(cx - 16, cy - 34, 32, 8);
        ctx.fillRect(cx - 10, cy - 40, 20, 10);
        // 目
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(cx - 5, cy - 22, 2, 0, Math.PI * 2);
        ctx.arc(cx + 5, cy - 22, 2, 0, Math.PI * 2);
        ctx.fill();
      } else if (enemy.type === 'boss_guardian') {
        // 森の番人 — 緑の精霊風
        // 体（苔むした岩のような体）
        ctx.fillStyle = '#2a7a3a';
        ctx.beginPath();
        ctx.arc(cx, cy + 5, 30, 0, Math.PI * 2);
        ctx.fill();
        // 葉の冠
        ctx.fillStyle = '#44cc44';
        for (let i = 0; i < 5; i++) {
          const angle = (i * 72 - 90) * Math.PI / 180;
          const lx = cx + Math.cos(angle) * 25;
          const ly = cy - 20 + Math.sin(angle) * 15;
          ctx.beginPath();
          ctx.moveTo(lx, ly - 12);
