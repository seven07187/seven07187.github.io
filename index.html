  <script>
// ===== battle.js - 戦闘システム =====
const Battle = (() => {
  let currentEnemy = null;
  let enemySymbol = null; // マップ上の敵シンボル参照
  let bullets = [];
  let bulletTimer = 0;
  let phase = 'command'; // command, attack_anim, bullet, result
  let selectedCmd = 0;
  let textQueue = [];
  let textIndex = 0;
  let textCharIndex = 0;
  let textTimer = 0;
  let attackAnimTimer = 0;
  let resultTimer = 0;
  let bulletPhaseTimer = 0;
  let bulletPhaseDuration = 0;
  let isActive = false;
  let shakeTimer = 0;

  const COMMANDS = ['fight', 'talk', 'item', 'flee'];
  const BULLET_DURATION_NORMAL = 300; // 5秒 (60fps)
  const BULLET_DURATION_BOSS = 960; // 16秒

  /** テキスト表示 */
  function showText(texts, callback) {
    textQueue = Array.isArray(texts) ? texts : [texts];
    textIndex = 0;
    textCharIndex = 0;
    textTimer = 0;
    phase = 'text';
    textCallback = callback;
  }

  let textCallback = null;

  /** テキスト更新 */
  function updateText() {
    const current = textQueue[textIndex];
    if (!current) return;

    textTimer++;
    if (textCharIndex < current.length) {
      if (textTimer % 2 === 0) textCharIndex++;
    }

    if (Input.isJustPressed('confirm') && textCharIndex >= current.length) {
      textIndex++;
      textCharIndex = 0;
      textTimer = 0;
      if (textIndex >= textQueue.length) {
        const cb = textCallback;
        textCallback = null;
        if (cb) cb();
      }
    }

    // テキストをスキップ
    if (Input.isJustPressed('confirm') && textCharIndex < current.length) {
      textCharIndex = current.length;
    }

    const el = document.getElementById('battle-text');
    if (el && textQueue[textIndex]) {
      el.textContent = textQueue[textIndex].substring(0, textCharIndex);
    }
  }

  /** コマンド選択更新 */
  function updateCommand() {
    if (Input.isJustPressed('left')) selectedCmd = Math.max(0, selectedCmd - 1);
    if (Input.isJustPressed('right')) selectedCmd = Math.min(COMMANDS.length - 1, selectedCmd + 1);

    // ボタンハイライト更新
    document.querySelectorAll('.battle-cmd').forEach((btn, i) => {
      btn.classList.toggle('selected', i === selectedCmd);
    });

    if (Input.isJustPressed('confirm')) {
      executeCommand(COMMANDS[selectedCmd]);
    }
  }

  /** コマンド実行 */
  function executeCommand(cmd) {
    switch (cmd) {
      case 'fight':
        phase = 'attack_anim';
        attackAnimTimer = 0;
        break;

      case 'talk':
        if (currentEnemy.isBoss && typeof GameEvent !== 'undefined') {
          const canPeace = GameEvent.getTempCanPeace();
          if (canPeace) {
            // 和解成功
            showText([
              '「…お前は戦わないのか？」',
              '「…分かった。話を聞こう。」',
              '（和解に成功した！）',
            ], () => {
              GameEvent.onBossBattleEnd('peace');
              const gold = currentEnemy.gold || 0;
              if (gold > 0) Player.gainGold(gold);
              Player.gainExp(currentEnemy.exp);
              endBattle(true);
            });
          } else {
            showText(['…話が通じない！'], () => {
              startBulletPhase();
            });
          }
        } else {
          showText([currentEnemy.description || '…'], () => {
            startBulletPhase();
          });
        }
        break;

      case 'item':
        if (Player.state.inventory.length === 0) {
          showText(['アイテムを持っていない！'], () => {
            startBulletPhase();
          });
        } else {
          // 簡易的に一番上の回復アイテムを使用する（UI実装簡略化のため）
          // 理想はアイテムリスト表示だが、今回は自動で回復アイテムを探して使用
          const itemUse = Player.state.inventory.find(i => {
            const def = Items.getItem(i.id);
            return def && (def.type === 'heal' || def.type === 'heal_cure' || def.type === 'cure');
          });

          if (itemUse) {
            const def = Items.getItem(itemUse.id);
            Items.useItemEffect(itemUse.id);
            Player.useItem(itemUse.id);
            UI.updateBattleHP();
            showText([`${def.name} を使った！\n${def.desc}`], () => {
              startBulletPhase();
            });
          } else {
            showText(['使えるアイテムがない！'], () => {
              startBulletPhase();
            });
          }
        }
        break;

      case 'flee':
        if (currentEnemy.isBoss) {
          showText(['…逃げられない！'], () => {
            startBulletPhase();
          });
        } else {
          showText(['逃げ出した！'], () => {
            endBattle(false);
          });
        }
        break;
    }
  }

  /** 攻撃アニメーション */
  function updateAttackAnim() {
    attackAnimTimer++;
    // フラッシュエフェクト
    if (attackAnimTimer === 10) {
      document.getElementById('screen-flash').classList.add('active');
      setTimeout(() => document.getElementById('screen-flash').classList.remove('active'), 300);
    }

    if (attackAnimTimer >= 30) {
      // ダメージ計算（装備込み攻撃力）
      const damage = Player.getAttack() + Math.floor(Math.random() * 3);
      currentEnemy.hp = Math.max(0, currentEnemy.hp - damage);
      UI.updateEnemyHP(currentEnemy);
      shakeTimer = 15;

      if (currentEnemy.hp <= 0) {
        if (currentEnemy.type === 'boss_cedar' && !currentEnemy.isForm2) {
          currentEnemy.hp = currentEnemy.maxHp;
          currentEnemy.isForm2 = true;
          currentEnemy.name = '真・スギノオウ';
          currentEnemy.attack += 2;
          currentEnemy.turnCount = 0;
          UI.updateEnemyHP(currentEnemy);
          document.getElementById('enemy-name').textContent = currentEnemy.name;
          showText(['スギノオウの様子が変わった…！', '真の恐ろしさが姿を現す！！'], () => {
            const ec = document.getElementById('enemy-canvas');
            const ectx = ec.getContext('2d');
            ectx.clearRect(0, 0, ec.width, ec.height);
            Enemy.drawEnemy(ectx, currentEnemy, ec.width, ec.height);
            startBulletPhase();
          });
          return;
        }

        // killCount加算
        if (Player.state.flags) Player.state.flags.killCount++;

        // ボス撃破時のイベントフラグ更新
        if (currentEnemy.isBoss && typeof GameEvent !== 'undefined' && GameEvent.getCurrentBossEventId()) {
          GameEvent.onBossBattleEnd('kill');
        }

        // ゴールド獲得
        const gold = currentEnemy.gold || 0;
        if (gold > 0) Player.gainGold(gold);

        // 勝利
        const rewardText = gold > 0
          ? `${currentEnemy.name} を倒した！\nEXP ${currentEnemy.exp}  G ${gold} を獲得！`
          : `${currentEnemy.name} を倒した！\nEXP ${currentEnemy.exp} を獲得！`;
        showText([rewardText], () => {
          const leveled = Player.gainExp(currentEnemy.exp);
          if (leveled) {
            showText([`レベルアップ！ LV ${Player.state.level}\nHP +5  攻撃力 +2`], () => {
              endBattle(true);
            });
          } else {
            endBattle(true);
          }
        });
      } else {
        showText([`${damage} のダメージ！`], () => {
          startBulletPhase();
        });
      }
    }
  }

  /** 弾幕フェーズ開始 */
  function startBulletPhase() {
    phase = 'bullet';
    bullets = [];
    bulletTimer = 0;
    bulletPhaseDuration = currentEnemy.isBoss ? BULLET_DURATION_BOSS : BULLET_DURATION_NORMAL;
    if (currentEnemy.isBoss) {
      currentEnemy.turnCount = (currentEnemy.turnCount || 0) + 1;
    }

    const container = document.getElementById('bullet-area-container');
    const canvas = document.getElementById('bullet-canvas');
    container.classList.add('active');
    canvas.width = container.clientWidth;
    canvas.height = container.clientHeight;

    // ハート初期位置（中央下）
    Player.state.heartX = canvas.width / 2;
    Player.state.heartY = canvas.height * 0.75;

    // コマンド非表示
    document.getElementById('battle-commands').style.visibility = 'hidden';
    document.getElementById('battle-text').textContent = '弾幕をよけろ！';
  }

  /** 弾幕フェーズ更新 */
  function updateBulletPhase() {
    const canvas = document.getElementById('bullet-canvas');
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;

    // プレイヤーハート移動
    Player.updateHeart({ left: 0, right: w, top: 0, bottom: h });

    // 弾幕生成の中心点を少しずつ動かす（単調な安地防止）
    let cx = w / 2 + Math.sin(bulletTimer * 0.02) * 50;
    let cy = h * 0.25 + Math.cos(bulletTimer * 0.015) * 30;
    
    const bossPhase = currentEnemy.isBoss ? (currentEnemy.turnCount - 1) : undefined;
    const newBullets = Enemy.spawnBullets(
      currentEnemy.bulletPattern,
      cx, cy, bulletTimer,
      Player.state.heartX, Player.state.heartY,
      bossPhase,
      currentEnemy,
      w, h
    );
    bullets.push(...newBullets);

    // 弾丸更新
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx;
      b.y += b.vy;

      // 画面外削除（画面外からの出現を許容するためバッファを100に拡大）
      if (b.x < -100 || b.x > w + 100 || b.y < -100 || b.y > h + 100) {
        bullets.splice(i, 1);
        continue;
      }

      // 当たり判定
      const dx = Player.state.heartX - b.x;
      const dy = Player.state.heartY - b.y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < Player.HEART_SIZE + b.radius - 2) {
        if (Player.takeDamage(currentEnemy.attack)) {
          // 状態異常の付与判定
          if (b.statusEffect && Player.state.statusEffects && !Player.state.statusEffects.includes(b.statusEffect)) {
            if (Math.random() < 0.3) { // 30%の確率で付与
              Player.state.statusEffects.push(b.statusEffect);
              UI.showNotification('「くしゃみ」状態になった！', 2000);
            }
          }

          UI.updateBattleHP();
          shakeTimer = 10;
          if (Player.state.hp <= 0) {
            phase = 'gameover';
            return;
          }
        }
      }
    }

    // 描画
    ctx.clearRect(0, 0, w, h);

    // 弾丸描画
    for (const b of bullets) {
      ctx.fillStyle = b.color || '#ffee44';
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius, 0, Math.PI * 2);
      ctx.fill();

      // グロー効果
      ctx.globalAlpha = 0.3;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.radius * 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }

    // ハート描画
    Player.drawHeart(ctx);

    // タイマー表示
    const remaining = Math.ceil((bulletPhaseDuration - bulletTimer) / 60);
    ctx.fillStyle = '#ffffff';
    ctx.font = '12px "DotGothic16", monospace';
    ctx.textAlign = 'right';
    ctx.fillText(`${remaining}s`, w - 8, 16);

    // HP表示とバー
    ctx.fillStyle = '#ffffff';
    ctx.font = '14px "DotGothic16", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(`HP ${Player.state.hp} / ${Player.state.maxHp}`, 8, h - 20);
    ctx.fillStyle = '#ff0000';
    ctx.fillRect(8, h - 14, 100, 6);
    ctx.fillStyle = '#00ff00';
    ctx.fillRect(8, h - 14, Math.max(0, 100 * Player.hpRatio()), 6);

    bulletTimer++;

    // フェーズ終了
    if (bulletTimer >= bulletPhaseDuration) {
      endBulletPhase();
    }
  }

  /** 弾幕フェーズ終了 */
  function endBulletPhase() {
    phase = 'command';
    bullets = [];
    document.getElementById('bullet-area-container').classList.remove('active');
    document.getElementById('battle-commands').style.visibility = 'visible';
    document.getElementById('battle-text').textContent = 'どうする？';
    selectedCmd = 0;
    document.querySelectorAll('.battle-cmd').forEach((btn, i) => {
      btn.classList.toggle('selected', i === 0);
    });
  }

  /** 戦闘終了 */
  function endBattle(victory) {
    isActive = false;
    Main.switchScreen('game');
    document.getElementById('bullet-area-container').classList.remove('active');
    document.getElementById('battle-commands').style.visibility = 'visible';

    if (victory && enemySymbol) {
      GameMap.removeEnemy(enemySymbol.id);
    }
    enemySymbol = null;
    currentEnemy = null;
    UI.updateStatus();
  }

  return {
    /** 戦闘開始 */
    start(enemyType, mapEnemy) {
      currentEnemy = Enemy.create(enemyType);
      enemySymbol = mapEnemy || null;
      if (!currentEnemy) return;

      isActive = true;
      phase = 'text';
      bullets = [];
      bulletTimer = 0;
      selectedCmd = 0;
      shakeTimer = 0;

      // 画面切り替え
      document.getElementById('game-screen').classList.remove('active');
      document.getElementById('battle-screen').classList.add('active');

      // 敵描画
      const ec = document.getElementById('enemy-canvas');
      const ectx = ec.getContext('2d');
      ectx.clearRect(0, 0, ec.width, ec.height);
      Enemy.drawEnemy(ectx, currentEnemy, ec.width, ec.height);
      document.getElementById('enemy-name').textContent = currentEnemy.name;
      UI.updateEnemyHP(currentEnemy);
      UI.updateBattleHP();

      // コマンドボタン初期化
      document.querySelectorAll('.battle-cmd').forEach((btn, i) => {
        btn.classList.toggle('selected', i === 0);
      });

      // 開始テキスト
      showText([`${currentEnemy.name} が現れた！`, currentEnemy.description], () => {
        phase = 'command';
        document.getElementById('battle-text').textContent = 'どうする？';
      });
    },

    /** 更新 */
    update() {
      if (!isActive) return;

      // シェイク
      const container = document.getElementById('battle-container');
      if (shakeTimer > 0) {
        shakeTimer--;
        container.style.transform = `translateX(${(Math.random() - 0.5) * 6}px)`;
      } else {
        container.style.transform = '';
      }

      switch (phase) {
        case 'text': updateText(); break;
        case 'command': updateCommand(); break;
        case 'attack_anim': updateAttackAnim(); break;
        case 'bullet': updateBulletPhase(); break;
        case 'gameover':
          document.getElementById('battle-text').textContent = 'やられてしまった…';
          if (Input.isJustPressed('confirm')) {
            endBattle(false);
            Player.init();
            GameMap.init();
            Main.switchScreen('title');
          }
          break;
      }
    },

    isActive() { return isActive; },
    /** フェーズ取得 */
    getPhase() { return phase; },

    /** 敵取得 */
    getCurrentEnemy() { return currentEnemy; },

    /** 初期化 (イベントリスナー登録) */
    initListeners() {
      const battleTextbox = document.getElementById('battle-textbox');
      if (battleTextbox) {
        battleTextbox.addEventListener('click', () => {
          if (isActive && phase === 'text') {
            Input.triggerConfirm();
          }
        });
      }

      document.querySelectorAll('.battle-cmd').forEach((btn, i) => {
        btn.addEventListener('click', () => {
          if (isActive && phase === 'command') {
            selectedCmd = i;
            Input.triggerConfirm();
          }
        });
      });
    }
  };
})();

// リスナー初期化
Battle.initListeners();

// ===== ui.js - UI管理 =====
const UI = (() => {
  let menuOpen = false;
  let menuMode = 'base'; // 'base', 'status', 'items', 'item_action'
  let menuSelectedIndex = 0;
  let itemSelectedIndex = 0;
  let itemActionIndex = 0; // 0=使用・装備, 1=やめる
  const MENU_OPTIONS = ['status', 'items', 'save', 'load', 'close'];

  return {
    /** ステータスバー更新 */
    updateStatus() {
      const s = Player.state;
      document.getElementById('status-level').textContent = s.level;
      const elGold = document.getElementById('status-gold');
      if (elGold) elGold.textContent = s.gold;
      
      document.getElementById('status-hp').textContent = `${s.hp}/${s.maxHp}`;
      document.getElementById('status-exp').textContent = s.exp;

      const ratio = Player.hpRatio();
      const hpBar = document.getElementById('hp-bar');
      hpBar.style.width = (ratio * 100) + '%';
      if (ratio > 0.5) hpBar.style.background = 'var(--hp-green)';
      else if (ratio > 0.25) hpBar.style.background = 'var(--hp-yellow)';
      else hpBar.style.background = 'var(--hp-red)';
    },

    /** 戦闘HP更新 */
    updateBattleHP() {
      const s = Player.state;
      document.getElementById('battle-level').textContent = s.level;
      document.getElementById('battle-hp').textContent = `${s.hp}/${s.maxHp}`;

      const ratio = Player.hpRatio();
      const hpBar = document.getElementById('battle-hp-bar');
      hpBar.style.width = (ratio * 100) + '%';
      if (ratio > 0.5) hpBar.style.background = 'var(--hp-green)';
      else if (ratio > 0.25) hpBar.style.background = 'var(--hp-yellow)';
      else hpBar.style.background = 'var(--hp-red)';
    },

    /** 敵HP更新 */
    updateEnemyHP(enemy) {
      const ratio = enemy.hp / enemy.maxHp;
      const bar = document.getElementById('enemy-hp-bar');
      bar.style.width = (ratio * 100) + '%';
      if (ratio > 0.5) bar.style.background = 'var(--hp-green)';
      else if (ratio > 0.25) bar.style.background = 'var(--hp-yellow)';
      else bar.style.background = 'var(--hp-red)';
    },

    /** 通知表示 */
    showNotification(text, duration) {
      const el = document.getElementById('notification');
      el.textContent = text;
      el.classList.remove('hidden');
      setTimeout(() => el.classList.add('hidden'), duration || 2000);
    },

    /** メニュー開閉 */
    toggleMenu() {
      menuOpen = !menuOpen;
      const screen = document.getElementById('menu-screen');
      if (menuOpen) {
        screen.classList.add('active');
        menuMode = 'base';
        menuSelectedIndex = 0;
        this.updateMenuSelection();
        this.updateMenuDetail();
      } else {
        screen.classList.remove('active');
      }
    },

    isMenuOpen() { return menuOpen; },

    /** メニュー更新 */
    updateMenu() {
      if (!menuOpen) return;

      if (menuMode === 'base') {
        if (Input.isJustPressed('up')) {
          menuSelectedIndex = Math.max(0, menuSelectedIndex - 1);
          this.updateMenuSelection();
          this.updateMenuDetail();
        }
        if (Input.isJustPressed('down')) {
          menuSelectedIndex = Math.min(MENU_OPTIONS.length - 1, menuSelectedIndex + 1);
          this.updateMenuSelection();
          this.updateMenuDetail();
        }

        if (Input.isJustPressed('confirm')) {
          const action = MENU_OPTIONS[menuSelectedIndex];
          switch (action) {
            case 'status':
              menuMode = 'status';
              this.updateMenuDetail();
              break;
            case 'items':
              if (Player.state.inventory.length > 0) {
                menuMode = 'items';
                itemSelectedIndex = 0;
                this.updateMenuDetail();
              } else {
                this.showNotification('アイテムがありません');
              }
              break;
            case 'save':
              Save.save();
              this.showNotification('セーブしました！');
              break;
            case 'load':
              if (Save.load()) {
                this.showNotification('ロードしました！');
                this.toggleMenu();
                GameMap.init();
                UI.updateStatus();
              } else {
                this.showNotification('セーブデータがありません');
              }
              break;
            case 'close':
              this.toggleMenu();
              break;
          }
        }

        if (Input.isJustPressed('cancel') || Input.isJustPressed('menu')) {
          this.toggleMenu();
        }

      } else if (menuMode === 'status') {
        if (Input.isJustPressed('cancel')) {
          menuMode = 'base';
          this.updateMenuDetail();
        }
      } else if (menuMode === 'items') {
        if (Input.isJustPressed('up')) {
          itemSelectedIndex = Math.max(0, itemSelectedIndex - 1);
          this.updateMenuDetail();

// ===== save.js - セーブ/ロード =====
const Save = (() => {
  const SAVE_KEY = 'overtale_save';

  return {
    /** セーブ */
    save() {
      const data = {
        player: Player.exportData(),
        timestamp: Date.now(),
        version: 1,
      };
      try {
        localStorage.setItem(SAVE_KEY, JSON.stringify(data));
        return true;
      } catch (e) {
        console.error('セーブ失敗:', e);
        return false;
      }
    },

    /** ロード */
    load() {
      try {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (!data || !data.player) return false;
        Player.importData(data.player);
        return true;
      } catch (e) {
        console.error('ロード失敗:', e);
        return false;
      }
    },

    /** セーブデータ存在確認 */
    hasSave() {
      return !!localStorage.getItem(SAVE_KEY);
    },

    /** セーブ削除 */
    deleteSave() {
      localStorage.removeItem(SAVE_KEY);
    },
  };
})();

    sceneLines = lines;
    sceneLineIndex = 0;
    sceneCharIndex = 0;
    sceneTimer = 0;
    lineWaiting = false;
    lineWaitTimer = 0;
    callback = onComplete || null;

    const overlay = document.getElementById('text-scene-overlay');
    const line = document.getElementById('text-scene-line');
    if (overlay) {
      overlay.classList.add('active');
      // タップで進行
      if (!overlay.dataset.listenerAdded) {
        const handleInteraction = (e) => {
          if (active && mode === 'textscene') {
            e.preventDefault();
            Input.triggerConfirm();
          }

        overlay.addEventListener('click', handleInteraction);

  function updateTextScene() {

    // 空行はそのまま次へ
    if (currentLine === '') {
      lineWaiting = true;
      lineWaitTimer = LINE_DELAY / 2;
    }

    // 行切り替え待機中
    if (lineWaiting) {
      lineWaitTimer--;
      // スキップ
      if (Input.isJustPressed('confirm')) {
        lineWaiting = false;
        lineWaitTimer = 0;
        sceneLineIndex++;
        sceneCharIndex = 0;
        sceneTimer = 0;
        return;
      }
      if (lineWaitTimer <= 0) {
        lineWaiting = false;
        sceneLineIndex++;
        sceneCharIndex = 0;
        sceneTimer = 0;
      }
      return;
    }

    // 文字送り
    sceneTimer++;
    if (sceneCharIndex < currentLine.length) {
      if (sceneTimer % TEXT_SPEED === 0) {
        sceneCharIndex++;
      }
      // Enter/Zで即表示
      if (Input.isJustPressed('confirm')) {
        sceneCharIndex = currentLine.length;
      }
    } else {
      // 全文表示済み → 次の行へ
      if (Input.isJustPressed('confirm')) {
        lineWaiting = true;
        lineWaitTimer = 10;
      }
    }

    // 表示更新

    if (lineEl) {
      lineEl.textContent = currentLine.substring(0, sceneCharIndex);
    }
  }

  function endTextScene() {
    const overlay = document.getElementById('text-scene-overlay');
    if (overlay) overlay.classList.remove('active');

    canvas.width = canvasW;
    canvas.height = canvasH;
    
    // ブラウザ表示サイズを動的に変更
    canvas.style.width = displayW + 'px';
    canvas.style.height = displayH + 'px';

    if (statusBar) {
      statusBar.style.width = displayW + 'px';
      statusBar.style.minWidth = 'auto'; // 動的リサイズを許可
    }
  }

  /** タイトルパーティクル生成 */
  function createTitleParticles() {
    const container = document.getElementById('title-particles');
    if (!container) return;
    for (let i = 0; i < 20; i++) {
      const p = document.createElement('div');
      p.classList.add('particle');
      p.style.left = Math.random() * 100 + '%';
      p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
      p.style.animationDelay = (Math.random() * 6) + 's';
      p.style.animationDuration = (4 + Math.random() * 4) + 's';
      const colors = ['#ffcc33', '#ff3355', '#33ff88', '#aa55ff', '#3388ff'];
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      container.appendChild(p);
    }
  }

  /** 新規ゲーム開始 */
  function startNewGame() {
    Player.init();
    GameMap.init();
    UI.updateStatus();
    // オープニング再生
    currentScreen = 'event';
    document.querySelectorAll('.screen:not(.overlay)').forEach(s => s.classList.remove('active'));
    document.getElementById('game-screen').classList.add('active');
    GameEvent.playOpening(() => {
      switchScreen('game');
    });
  }

  /** ロードゲーム */
  function loadGame() {
    if (Save.load()) {
      GameMap.init();
      UI.updateStatus();
      switchScreen('game');
    }
  }

  /** 画面切り替え */
  function switchScreen(screen) {
    document.querySelectorAll('.screen:not(.overlay)').forEach(s => s.classList.remove('active'));
    currentScreen = screen;
    switch (screen) {
      case 'title':
        document.getElementById('title-screen').classList.add('active');
        break;
      case 'game':
        document.getElementById('game-screen').classList.add('active');
        break;
      case 'battle':
        document.getElementById('battle-screen').classList.add('active');
        break;
    }
  }

  /** タイトル画面更新 */
  function updateTitle() {
    if (Input.isJustPressed('up') || Input.isJustPressed('down')) {
      titleSelectedIndex = titleSelectedIndex === 0 ? 1 : 0;
      document.querySelectorAll('.title-option').forEach((opt, i) => {
        opt.classList.toggle('selected', i === titleSelectedIndex);
      });
    }

    if (Input.isJustPressed('confirm')) {
      if (titleSelectedIndex === 0) {
        startNewGame();
      } else if (Save.hasSave()) {
        loadGame();
      }
    }
  }

  /** NPC会話開始 */
  function startDialogue(npc) {
    talkingNPC = npc;
    dialogueIndex = 0;
    dialogueCharIndex = 0;
    dialogueTimer = 0;
  }

  /** NPC会話更新 */
  function updateDialogue() {
    if (!talkingNPC) return false;

    const text = talkingNPC.dialogue[dialogueIndex];
    if (!text) { talkingNPC = null; return false; }

    dialogueTimer++;
    if (dialogueCharIndex < text.length) {
      if (dialogueTimer % 2 === 0) dialogueCharIndex++;
    }

    // テキストスキップ
    if (Input.isJustPressed('confirm') && dialogueCharIndex < text.length) {
      dialogueCharIndex = text.length;
    } else if (Input.isJustPressed('confirm') && dialogueCharIndex >= text.length) {
      dialogueIndex++;
      dialogueCharIndex = 0;
      dialogueTimer = 0;
      if (dialogueIndex >= talkingNPC.dialogue.length) {
        // オブジェクト毎のカスタムイベント処理 (調べるイベント)
        if (talkingNPC.isObject && talkingNPC.inspectEvent) {
          const ev = talkingNPC.inspectEvent;
          const flags = Player.state.flags;
          
          if (ev === 'ruins_sign') {
            flags.readSign = true;
          }
          else if (ev === 'ruins_loot') {
            if (flags.lootedShops < 3) {
              flags.lootedShops++;
              Player.addItem('potion', 1); // 汎用回復アイテム(仮)または他の有用なアイテム
              UI.showNotification('傷薬を見つけた！', 2000);
            } else {
              UI.showNotification('もう何も残っていない…', 2000);
            }
          }
          else if (ev === 'ruins_door') {
            if (flags.powerOn) {
              UI.showNotification('扉のロックが解除された！', 2000);
              // ここで中に入れるようにする (warpsの判定は既にmap.js側で行う)
            }
          }
          else if (ev === 'ruins_merchant') {
            // ショップイベント
          }
          else if (ev === 'ruins_generator') {
            if (!flags.powerOn) {
              flags.powerOn = true;
              UI.showNotification('非常用電源が回復した！', 2000);
            }
          }
          else if (ev === 'ruins_memorial') {
            flags.memorialSeen = true;
          }
          else if (ev === 'ruins_hospital') {
            flags.learnedForestTruth = true;
          }
          else if (ev === 'ruins_school') {
            flags.readDiaryCount++;
          }
          else if (ev === 'ruins_basement') {
            flags.learnedCoexistenceHint = true;
          }
        }
        
        // 通常の会話フラグ設定
        if (talkingNPC.flagSet && Player.state.flags) {
          Object.assign(Player.state.flags, talkingNPC.flagSet);
        }
        
        // サバイバー選択肢イベント
        if (talkingNPC.isSurvivorEvent && typeof GameEvent !== 'undefined') {
          const originalNpc = talkingNPC; // タイマーリセット等で消える前に保持
          talkingNPC = null;
          GameEvent.showChoice(['話を聞く', '急いでいる', '杉は全部倒すべきだ'], (index, text) => {
            if (text === '話を聞く') {
              Player.state.flags.routePoint += 1;
              Player.state.flags.listenedSurvivor = true;
              
              GameEvent.startTextScene([
                '……そうか、ちゃんと話を聞いてくれるのか',
                '確かに、杉は原因の一つだと思う',
                'でもな……\n昔は、こんなことなかったんだ',
                '森はもっと静かで、\n人間とちゃんと距離を保ってた',
                'それを壊したのは、俺たちかもしれない',
                '木を切って、土地を広げて、\n都合よく自然を使ってきた',
                'その結果が、これだとしたら……',
                '全部を壊すだけで、本当に終わるのか？',
                '（少しの沈黙）',
                '……あんたがどうするかは、あんたが決めることだ',
                'でも、もし戦うなら――\n“何のために戦うのか”だけは、忘れるな'
              ], () => {
                Player.addItem('old_mask', 1);
                UI.showNotification('古い防護マスクを手に入れた！', 3000);
                originalNpc.isSurvivorEvent = false;
                originalNpc.dialogue = ['“何のために戦うのか”だけは、忘れるな。'];
                Main.switchScreen('game');
              });
              
            } else if (text === '急いでいる') {
              GameEvent.startTextScene([
                '……そうか',
                'ここに長くいるべき場所じゃないのは、確かだな',
                '気をつけて進めよ',
                '外は……まだ、終わってない'
              ], () => {
                originalNpc.isSurvivorEvent = false;
                originalNpc.dialogue = ['ここはもうほとんど終わった町だ。\n気をつけて進めよ。'];
                Main.switchScreen('game');
              });

            } else if (text === '杉は全部倒すべきだ') {
              Player.state.flags.antiTreeChoice = true;
              GameEvent.startTextScene([
                '……そう言うと思ったよ',
                'ここまで見れば、そう思うのも無理はない',
                '実際、俺も何度も思った\n「全部なくなればいい」ってな',
                '（少し間）',
                'でもな……\n全部なくした後に、何が残るんだろうな',
                'ここみたいに、\n何も残らない場所が増えるだけかもしれない',
                '……まあいい\nあんたの決めた道だ',
                '最後まで、やりきれよ'
              ], () => {
                originalNpc.isSurvivorEvent = false;
                originalNpc.dialogue = ['あんたの決めた道だ。\n最後まで、やりきれよ。'];
                Main.switchScreen('game');
              });
            }
          });
          // 画面全体を隠さずに、イベント制御に切り替える
          currentScreen = 'event';
          return false;
        }

        // ショップNPCならショップを開く
        if (talkingNPC.isShop && typeof Items !== 'undefined') {
          Items.openShop(talkingNPC.shopId);
        }
        talkingNPC = null;
        return false;
      }
    }

    if (Input.isJustPressed('cancel')) {
      talkingNPC = null;
      return false;
    }

    return true;
  }

  /** NPC会話描画 */
  function drawDialogue() {
    if (!talkingNPC) return;
    const text = talkingNPC.dialogue[dialogueIndex];
    if (!text) return;

    const displayText = text.substring(0, dialogueCharIndex);

    // 会話ボックス
    ctx.fillStyle = 'rgba(0, 0, 0, 0.85)';
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    const boxX = 20, boxY = canvasH - 100, boxW = canvasW - 40, boxH = 80;
    ctx.fillRect(boxX, boxY, boxW, boxH);
    ctx.strokeRect(boxX, boxY, boxW, boxH);

    // NPC名
    ctx.fillStyle = '#ffcc33';
    ctx.font = '14px "DotGothic16", monospace';
    ctx.textAlign = 'left';
    ctx.fillText(talkingNPC.name, boxX + 10, boxY + 18);

    // テキスト
    ctx.fillStyle = '#ffffff';
    ctx.font = '13px "DotGothic16", monospace';
    const lines = displayText.split('\n');
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], boxX + 10, boxY + 38 + i * 18);
    }

    // 進行マーク
    if (dialogueCharIndex >= text.length) {
      ctx.fillStyle = '#ffcc33';
      ctx.globalAlpha = 0.5 + 0.5 * Math.sin(Date.now() / 200);
      ctx.fillText('▼', boxX + boxW - 24, boxY + boxH - 10);
      ctx.globalAlpha = 1;
    }
  }

  /** マップ画面更新 */
  function updateGame() {
    // メニュー処理
    if (UI.isMenuOpen()) {
      UI.updateMenu();
      return;
    }

    // ショップUI処理
    if (typeof Items !== 'undefined' && Items.isShopUIOpen()) {
      Items.handleShopInput();
      return;
    }

    if (Input.isJustPressed('menu')) {
      UI.toggleMenu();
      return;
    }

    // NPC会話中
    if (talkingNPC) {
      updateDialogue();
      // 描画
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, canvasW, canvasH);
      GameMap.draw(ctx, canvasW, canvasH);
      drawDialogue();
      UI.updateStatus();
      return;
    }

    // プレイヤー移動
    GameMap.updatePlayerMovement();

    // ゾーン更新
    GameMap.updateZone();

    // NPC接触 → Zキーで会話
    if (Input.isJustPressed('confirm')) {
      const npc = GameMap.checkNPCContact();
      if (npc) {
        startDialogue(npc);
        ctx.fillStyle = '#0a0a0f';
        ctx.fillRect(0, 0, canvasW, canvasH);
        GameMap.draw(ctx, canvasW, canvasH);
        drawDialogue();
        UI.updateStatus();
        return;
      }
    }

    // ボス接触判定
    if (encounterCooldown <= 0) {
      const boss = GameMap.checkBossContact();
      if (boss) {
        encounterCooldown = 60;
        if (typeof GameEvent !== 'undefined') {
          if (boss.bossId === 'boss1') {
            GameEvent.startBoss1Event();
            currentScreen = 'event';
          } else if (boss.bossId === 'boss2') {
            GameEvent.startBoss2Event();
            currentScreen = 'event';
          } else if (boss.bossId === 'final') {
            GameEvent.startFinalBossEvent();
          }
        } else {
          Battle.start(boss.type, { id: boss.bossId || 'boss', type: boss.type });
          switchScreen('battle');
        }
        return;
      }
    }

    // ランダムエンカウント
    if (encounterCooldown <= 0) {
      const enemyType = GameMap.checkEncounter();
      if (enemyType) {
        encounterCooldown = 120;
        Battle.start(enemyType, null);
        switchScreen('battle');
        return;
      }
    }

    if (encounterCooldown > 0) encounterCooldown--;

    // セーブポイント
    if (GameMap.checkSavePoint()) {
      if (!savePointMsgShown) {
        savePointMsgShown = true;
        UI.showNotification('セーブポイント - Zキーでセーブ', 2000);
      }
      if (Input.isJustPressed('confirm')) {
        Player.heal(Player.state.maxHp); // 先に回復
        Save.save();                     // その後にセーブ
        UI.updateStatus();
        UI.showNotification('セーブしました！ HPが全回復した！', 2000);
      }
    } else {
      savePointMsgShown = false;
    }

    // マップ描画
    ctx.fillStyle = '#0a0a0f';
    ctx.fillRect(0, 0, canvasW, canvasH);
    GameMap.draw(ctx, canvasW, canvasH);

    // 廃墟等の霧エフェクト
    const zone = GameMap.getCurrentZone();
    if (zone && zone.hazard === 'pollen_fog') {
      ctx.fillStyle = 'rgba(200, 200, 50, 0.25)'; 
      ctx.fillRect(0, 0, canvasW, canvasH);
    }

    // ステータス更新
    UI.updateStatus();
  }

  /** ゲームループ */
  function gameLoop() {
    Input.update();

    switch (currentScreen) {
      case 'title':
        updateTitle();
        break;
      case 'game':
        updateGame();
        break;
      case 'battle':
        Battle.update();
        break;
      case 'event':
        if (typeof GameEvent !== 'undefined') {
          GameEvent.update();
          // イベントが終了して戦闘画面に切り替わっていない場合、ゲーム画面に戻る
          if (!GameEvent.isActive() && currentScreen === 'event') {
            switchScreen('game');
          }
        }
        break;
    }

    requestAnimationFrame(gameLoop);
  }

  // DOM読み込み完了後に初期化
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  return {
    switchScreen,
    getCurrentScreen() { return currentScreen; },
  };
})();

</script>
</body>
</html>
